                          my_rating:
                            type: integer
                            description: What you just gave.
                            example: 5
                          rating:
                            type: number
                            format: double
                            description: The turf's new average.
                            example: 4.6
                          rating_count:
                            type: integer
                            example: 38
              example:
                success: true
                message: Thanks for rating!
                statusCode: 200
                data:
                  venue_id: 4d5e6f7a-8b9c-4d0e-1f2a-3b4c5d6e7f8a
                  my_rating: 5
                  rating: 4.6
                  rating_count: 38
        '400':
          description: Rating is not a whole number in 1..5 (`VALIDATION_ERROR`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: VALIDATION_ERROR
                message: Rating must be a whole number from 1 to 5
                errors: []
                data: null

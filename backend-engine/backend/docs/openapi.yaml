openapi: 3.0.3

info:
  title: FunTurf API
  version: 1.0.0
  description: |
    REST API for **FunTurf** — a turf (sports ground) booking and game-organizing
    platform for Bangladesh.

    ## Response envelope

    Every successful response is wrapped by `ApiResponse`
    (`src/utils/apiResponse.js`):

    ```json
    { "success": true, "message": "Venue found", "data": { }, "statusCode": 200 }
    ```

    Every failure is serialized by the terminal `errorHandler`
    (`src/utils/errorHandler.js`) into a different shape — note it carries a
    machine-readable `code` and has no `statusCode` field:

    ```json
    { "success": false, "code": "SLOT_UNAVAILABLE", "message": "This slot is already booked",
      "errors": [], "data": null }
    ```

    **Key the UI off `code`, never off `message`.** Codes are stable and are
    listed in `src/utils/errorCodes.js`; messages get reworded.

    Every JSON endpoint under `/api/v1` uses these two envelopes without
    exception. (`GET /health` sits outside `/api/v1` and returns plain text.)

    ## Authentication

    A `Bearer` access token in the `Authorization` header (`verifyJWT`). Tokens
    come from `/users/login`, `/users/register` or `/users/refresh`. The access
    token payload carries `{ id, email, user_type }`.

    Three auth modes appear below:

    - **required** — the route mounts `verifyJWT`; a missing/expired token is
      `MISSING_TOKEN` / `INVALID_TOKEN` (401).
    - **optional** (`attachUserIfPresent`) — the route is public, but a valid
      token unlocks caller-specific extras (e.g. `my_rating`, `my_slots`,
      `turfmates_involved`). An invalid token is silently treated as anonymous.
    - **none** — fully public.

    ## Roles

    `user_type` is one of `player`, `turf_admin`, `super_admin`. Public signup may
    only self-assign `player` or `turf_admin`. `authorizeRoles` gates who may
    *reach* an admin route; controllers additionally scope each action to the turf
    the caller actually owns, so one `turf_admin` can never act on another's
    bookings. `super_admin` is global.

    ## Rate limits

    Limiters key on the user id when authenticated, else on the (IPv6-normalized)
    IP. Exceeding one returns `RATE_LIMITED` (429) in the standard error envelope,
    with `RateLimit-*` (draft-7) response headers.

    | Limiter | Window | Limit | Applies to |
    |---|---|---|---|
    | `bookingWriteLimiter` | 60s | 10 | booking create / payment / cancel / check-in |
    | `bookingReadLimiter` | 60s | 120 | availability, quote, dashboard-stats, verify-lookup |
    | `commentWriteLimiter` | 60s | 20 | comment + chat/DM writes |

    ## Realtime

    Socket.IO shares the HTTP port and is JWT-authed. REST writes fan out
    `chat:new`, `chat:update`, `chat:delete`, `chat:reaction`, `dm:new`,
    `dm:read`, `dm:reaction` and `event:roster` to the relevant user rooms; those
    events are outside the scope of this document.
  contact:
    name: FunTurf Engineering
  license:
    name: UNLICENSED

servers:
  - url: http://localhost:8080/api/v1
    description: Local development (`npm run dev` from `backend-engine/backend/`)
  - url: https://app4-osju.onrender.com/api/v1
    description: Production (nginx -> app1/2/3 on Render)

security:
  - bearerAuth: []

tags:
  - name: Auth & Users
    description: Registration, login, token refresh, public profiles, media signing.
  - name: Turfmates
    description: User-to-user connections (requests, turfmates, recommendations).
  - name: Events
    description: Matches — create, discover, join/leave, invitations, admins.
  - name: Event Discussion
    description: Public comment thread on a match (writing is member-only).
  - name: Event Chat
    description: Private squad chat for a match's approved players and admins.
  - name: Teams
    description: Persistent squads — roster, roles, positions, team-organized matches.
  - name: Team Invites
    description: Recruiting players onto a team and responding to invitations.
  - name: Venues
    description: Turfs and their grounds; ratings.
  - name: Bookings
    description: Slot availability, price quotes, bookings, payment verification.
  - name: Promotions
    description: Coupon management and analytics (turf managers).
  - name: Coupons
    description: Customer-facing coupon discovery.
  - name: Notifications
    description: The caller's notification bell.
  - name: Chat
    description: Direct messages and the unified conversation list.
  - name: System
    description: Health probe.

paths:

  # ===========================================================================
  # Auth & Users
  # ===========================================================================
  /users/register:
    post:
      tags: [Auth & Users]
      summary: Register a new account
      operationId: registerUser
      security: []
      description: |
        Creates an account and returns it **with a token pair** — the client is
        signed in immediately, no separate login call.

        The submitted password goes in `password_hash` (the `encryptPassword`
        middleware bcrypts it in place before the controller runs). `user_type`
        is whitelisted to `player` or `turf_admin`; anything else — including
        `super_admin` — silently falls back to `player`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email, password_hash]
              properties:
                first_name:
                  type: string
                  example: Rafi
                last_name:
                  type: string
                  example: Ahmed
                email:
                  type: string
                  format: email
                  description: Unique across accounts.
                  example: rafi@example.com
                password_hash:
                  type: string
                  format: password
                  description: |
                    The **plaintext password**. Named `password_hash` because the
                    middleware hashes this field in place before persisting.
                  example: correct-horse-battery-staple
                phone:
                  type: string
                  nullable: true
                  description: Unique when provided.
                  example: '+8801712345678'
                user_type:
                  type: string
                  enum: [player, turf_admin]
                  default: player
                  description: Any other value (incl. `super_admin`) falls back to `player`.
                  example: player
                date_of_birth:
                  type: string
                  format: date
                  nullable: true
                  example: '1998-03-14'
                gender:
                  type: string
                  nullable: true
                  example: male
                profile_picture_url:
                  type: string
                  format: uri
                  nullable: true
                  example: https://res.cloudinary.com/funturf/image/upload/v1718000000/images/rafi.jpg
                bio:
                  type: string
                  nullable: true
                  example: Left winger. Free most evenings after 8.
                division:
                  type: string
                  nullable: true
                  description: Home location — powers turfmate recommendations.
                  example: Dhaka
                district:
                  type: string
                  nullable: true
                  example: Gulshan
                latitude:
                  type: number
                  format: double
                  nullable: true
                  example: 23.7925
                longitude:
                  type: number
                  format: double
                  nullable: true
                  example: 90.4078
                status:
                  type: string
                  nullable: true
                  example: active
                email_verified:
                  type: boolean
                  nullable: true
                  example: false
                phone_verified:
                  type: boolean
                  nullable: true
                  example: false
                preferred_language:
                  type: string
                  nullable: true
                  example: en
                timezone:
                  type: string
                  nullable: true
                  example: Asia/Dhaka
            example:
              first_name: Rafi
              last_name: Ahmed
              email: rafi@example.com
              password_hash: correct-horse-battery-staple
              phone: '+8801712345678'
              user_type: player
              division: Dhaka
              district: Gulshan
      responses:
        '201':
          description: Account created and signed in.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthUser'
              example:
                success: true
                message: User created successfully
                statusCode: 201
                data:
                  id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                  email: rafi@example.com
                  first_name: Rafi
                  last_name: Ahmed
                  status: active
                  user_type: player
                  bio: null
                  email_verified: false
                  phone_verified: false
                  profile_picture_url: null
                  accessToken: eyJhbGciOiJIUzI1NiJ9.eyJpZCI6IjNmMWMyYjdlIn0.7sVQ1n0m2k3l4j5h6g7f8d9s0a1p2o3i4u5y6t7r8e9
                  refreshToken: eyJhbGciOiJIUzI1NiJ9.eyJpZCI6IjNmMWMyYjdlIn0.9x8c7v6b5n4m3k2j1h0g9f8d7s6a5p4o3i2u1y0t9r8
                  tokenExpiresIn: 1d
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email or phone already registered (`USER_ALREADY_EXISTS`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: USER_ALREADY_EXISTS
                message: A user with this email or phone already exists
                errors: []
                data: null
        '500':
          $ref: '#/components/responses/InternalError'

  /users/login:
    post:
      tags: [Auth & Users]
      summary: Sign in
      operationId: loginUser
      security: []
      description: |
        Exchanges credentials for a token pair.

        A wrong password and an unknown email both return the **same**
        `INVALID_CREDENTIALS` — a deliberate guard against user enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: rafi@example.com
                password:
                  type: string
                  format: password
                  example: correct-horse-battery-staple
      responses:
        '200':
          description: Signed in.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [user]
                        properties:
                          user:
                            $ref: '#/components/schemas/LoginUser'
              example:
                success: true
                message: User Logged In Successfully.
                statusCode: 200
                data:
                  user:
                    id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                    email: rafi@example.com
                    first_name: Rafi
                    last_name: Ahmed
                    status: active
                    user_type: player
                    bio: Left winger. Free most evenings after 8.
                    email_verified: false
                    phone_verified: false
                    profile_picture_url: https://res.cloudinary.com/funturf/image/upload/v1718000000/images/rafi.jpg
                    username: rafi
                    accessToken: eyJhbGciOiJIUzI1NiJ9.eyJpZCI6IjNmMWMyYjdlIn0.7sVQ1n0m2k3l4j5h6g7f8d9s0a1p2o3i4u5y6t7r8e9
                    refreshToken: eyJhbGciOiJIUzI1NiJ9.eyJpZCI6IjNmMWMyYjdlIn0.9x8c7v6b5n4m3k2j1h0g9f8d7s6a5p4o3i2u1y0t9r8
                    tokenExpiresIn: 1d
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Unknown email or wrong password (`INVALID_CREDENTIALS`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: INVALID_CREDENTIALS
                message: Invalid email or password
                errors: []
                data: null
        '500':
          $ref: '#/components/responses/InternalError'

  /users/refresh:
    post:
      tags: [Auth & Users]
      summary: Rotate the token pair
      operationId: refreshToken
      security: []
      description: |
        Trades a valid refresh token for a fresh access + refresh pair. The
        submitted token must match the one stored on the user row, so a rotated or
        revoked token is rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiJ9.eyJpZCI6IjNmMWMyYjdlIn0.9x8c7v6b5n4m3k2j1h0g9f8d7s6a5p4o3i2u1y0t9r8
      responses:
        '200':
          description: New token pair issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [accessToken, refreshToken]
                        properties:
                          accessToken:
                            type: string
                            example: eyJhbGciOiJIUzI1NiJ9.eyJpZCI6IjNmMWMyYjdlIn0.aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789abcdef
                          refreshToken:
                            type: string
                            example: eyJhbGciOiJIUzI1NiJ9.eyJpZCI6IjNmMWMyYjdlIn0.zYxWvUtSrQpOnMlKjIhGfEdCbA9876543210fedcba
                          tokenExpiresIn:
                            type: string
                            example: 1d
        '401':
          description: |
            Missing, invalid, expired, or superseded refresh token. Returns the
            legacy status-derived code `UNAUTHORIZED`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: UNAUTHORIZED
                message: Token refresh failed
                errors: []
                data: null

  /users/media/signature:
    post:
      tags: [Auth & Users]
      summary: Sign a Cloudinary upload
      operationId: signMedia
      description: |
        Returns a short-lived signature for a direct browser→Cloudinary upload
        into the `images` folder, so the file never transits this API.

        **Auth required.** The signature *is* the upload credential, so this
        endpoint is not public — an anonymous caller could otherwise upload
        arbitrary files into the project's Cloudinary account.

        The signature is bound to `timestamp` and to the exact upload params, so
        it can't be replayed to write outside the `images` folder. The Cloudinary
        `api_secret` is used only to sign and is never returned; `apikey` is safe
        to hold client-side — Cloudinary's signed-upload flow expects it to be
        sent alongside the signature.
      responses:
        '200':
          description: Signature issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [signature, timestamp, cloudname, apikey]
                        properties:
                          signature:
                            type: string
                            description: Hex signature to send to Cloudinary with the upload.
                            example: 98140db7417059260a8c06d43823bb2deacfa08e
                          timestamp:
                            type: integer
                            description: Unix seconds. The signature is bound to it, so it expires.
                            example: 1784212486
                          cloudname:
                            type: string
                            example: funturf
                          apikey:
                            type: string
                            example: '622424748388312'
              example:
                success: true
                message: Upload signature created
                statusCode: 200
                data:
                  signature: 98140db7417059260a8c06d43823bb2deacfa08e
                  timestamp: 1784212486
                  cloudname: funturf
                  apikey: '622424748388312'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me:
    patch:
      tags: [Auth & Users]
      summary: Edit your own profile
      operationId: updateMyProfile
      description: |
        Partial update of the signed-in user's profile, spanning both the account
        row (`users`) and the sporting profile (`player_profiles`, created on
        first save). Both writes run in one transaction, so a profile can never
        end up half-saved.

        **The target user is taken from the JWT**, never from the path or body —
        `me` is a literal. There is no id to tamper with, so one user cannot edit
        another.

        Fields are **allowlisted**. Anything not listed below is ignored rather
        than written. Not editable here, by design:

        | Blocked | Why |
        |---|---|
        | `email`, `user_type`, `status` | identity / trust boundary — each needs its own verified flow |
        | `email_verified`, `phone_verified` | set by verification, not by the user claiming it |
        | `password_hash`, `refresh_token` | credentials, never a profile field |
        | `rating`, `total_games_played`, `total_games_organized`, `reliability_score` | server-derived reputation; self-editing would make it meaningless |

        **Semantics:** an absent key leaves the field alone; an explicit `null`
        (or `""`) clears it. `first_name`/`last_name` cannot be cleared.

        **Image URLs** are client-supplied (the client uploads first, then PATCHes
        the resulting URL), so they are validated as `https` on an allowlisted
        image host — otherwise a profile could point at arbitrary third-party
        content. Extend the allowlist via the `PROFILE_IMAGE_HOSTS` env var.

        **Validation:** enums must match the Prisma enum exactly; integers are
        range-clamped (`years_of_experience` 0–60, `jersey_number` 0–99,
        `height_cm` 50–260, `weight_kg` 20–250, `max_travel_distance_km` 0–200);
        `date_of_birth` must imply an age of 10–120; text fields are length-capped;
        `preferred_positions` accepts ≤6 entries and `sports_played` ≤12.

        Rate limited to 20 writes/minute per user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              description: Any subset of the editable fields. All are nullable unless noted.
              properties:
                first_name: { type: string, maxLength: 100 }
                last_name: { type: string, maxLength: 100 }
                phone: { type: string, maxLength: 20, nullable: true }
                date_of_birth: { type: string, format: date, nullable: true }
                gender:
                  type: string
                  nullable: true
                  enum: [male, female, other, prefer_not_to_say]
                bio: { type: string, maxLength: 1000, nullable: true }
                division: { type: string, maxLength: 100, nullable: true }
                district: { type: string, maxLength: 100, nullable: true }
                profile_picture_url:
                  type: string
                  format: uri
                  nullable: true
                  description: https URL on an allowlisted image host.
                cover_photo_url:
                  type: string
                  format: uri
                  nullable: true
                  description: https URL on an allowlisted image host; already cropped to the banner aspect.
                preferred_positions:
                  type: array
                  nullable: true
                  maxItems: 6
                  items: { type: string }
                sports_played:
                  type: array
                  nullable: true
                  maxItems: 12
                  items: { type: string }
                skill_level:
                  type: string
                  nullable: true
                  enum: [beginner, intermediate, advanced, professional, any]
                preferred_foot:
                  type: string
                  nullable: true
                  enum: [left, right, both]
                preferred_play_time:
                  type: string
                  nullable: true
                  enum: [morning, afternoon, evening, night, flexible]
                years_of_experience: { type: integer, minimum: 0, maximum: 60, nullable: true }
                jersey_number: { type: integer, minimum: 0, maximum: 99, nullable: true }
                height_cm: { type: integer, minimum: 50, maximum: 260, nullable: true }
                weight_kg: { type: integer, minimum: 20, maximum: 250, nullable: true }
                max_travel_distance_km: { type: integer, minimum: 0, maximum: 200, nullable: true }
                achievements: { type: string, maxLength: 1000, nullable: true }
            example:
              bio: Left winger. Free most evenings after 8.
              district: Gazipur
              skill_level: intermediate
              preferred_positions: [winger, forward]
              sports_played: [Football, Cricket]
              cover_photo_url: https://i.ibb.co/abc123/cover.jpg
      responses:
        '200':
          description: |
            Profile updated. Returns the refreshed profile including a recomputed
            `profile_completion`, so the client can drop it straight into its cache.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
        '400':
          description: |
            `VALIDATION_ERROR` — no editable fields supplied, an enum/range/length
            violation, or an image URL that isn't https on an allowlisted host.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '409':
          description: '`CONFLICT` — that phone number belongs to another account.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '429':
          description: Rate limit exceeded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }

  /users/scout:
    get:
      tags: [Auth & Users]
      summary: Scout players to recruit
      operationId: scoutPlayers
      description: |
        The search a captain runs to fill a squad: "who near me plays football, as
        a winger, at roughly this level?". Every filter is optional and they AND
        together. The caller is always excluded from their own results.

        **Ranking — profile completeness is the dominant term.** Every result
        already satisfies the filters, so relevance is binary; what's left to rank
        on is who the captain can actually evaluate. A profile with no sport, no
        position and no skill level is unrankable noise however nearby the person
        lives. Score:

        | Term | Range | Note |
        |---|---|---|
        | profile completeness | 0–10 | the same weighted percent shown on the profile page |
        | same district / division | 3 / 1 | proximity |
        | player rating | 0–5 | form |
        | reliability score | 0–2 | `reliability_score / 100 × 2` |

        Filtering by `sport` or `position` implicitly excludes players with no
        sporting profile at all — they cannot match. The internal score is never
        returned; `profile_completion_percent` is, so the UI can badge a full
        profile.

        **Auth is required** — this lists other users, so a public version would be
        an anonymous directory of everyone on the platform. Results carry **no
        email or phone**: a people-search returning contact details would be a
        harvesting endpoint, and neither is needed to decide whether to invite
        someone.

        The candidate pool is capped at 200 rows before ranking, so an unfiltered
        search can't become a full table scan plus sort.
      parameters:
        - name: q
          in: query
          description: Name fragment, case-insensitive, matched against first OR last name.
          schema: { type: string }
        - name: sport
          in: query
          description: Exact sport, matched inside the `sports_played` JSON array.
          schema: { type: string, example: Football }
        - name: position
          in: query
          description: Exact position, matched inside the `preferred_positions` JSON array.
          schema: { type: string, example: winger }
        - name: skill
          in: query
          schema:
            type: string
            enum: [beginner, intermediate, advanced, professional, any]
        - name: division
          in: query
          schema: { type: string }
        - name: district
          in: query
          schema: { type: string }
        - name: limit
          in: query
          description: 1–50, default 20.
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        '200':
          description: Ranked players, most complete first.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          count: { type: integer, example: 12 }
                          players:
                            type: array
                            items:
                              type: object
                              description: Public-safe player card. No email, no phone.
                              properties:
                                id: { $ref: '#/components/schemas/Uuid' }
                                first_name: { type: string }
                                last_name: { type: string }
                                profile_picture_url: { type: string, format: uri, nullable: true }
                                cover_photo_url: { type: string, format: uri, nullable: true }
                                division: { type: string, nullable: true }
                                district: { type: string, nullable: true }
                                bio: { type: string, nullable: true }
                                profile_completion_percent:
                                  type: integer
                                  description: Same figure the player sees on their own profile.
                                  example: 78
                                profile:
                                  type: object
                                  nullable: true
                                  description: Sporting profile, or null if they have none.
                                  properties:
                                    skill_level: { type: string, nullable: true }
                                    preferred_positions:
                                      type: array
                                      items: { type: string }
                                      nullable: true
                                    sports_played:
                                      type: array
                                      items: { type: string }
                                      nullable: true
                                    preferred_foot: { type: string, nullable: true }
                                    preferred_play_time: { type: string, nullable: true }
                                    years_of_experience: { type: integer, nullable: true }
                                    jersey_number: { type: integer, nullable: true }
                                    max_travel_distance_km: { type: integer, nullable: true }
                                    rating: { type: number, nullable: true }
                                    reliability_score: { type: integer, nullable: true }
                                    total_games_played: { type: integer, nullable: true }
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }

  /users/{user_id}:
    get:

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /venues/create-venue:
    post:
      tags: [Venues]
      summary: Create a turf
      operationId: createVenue
      description: |
        **Roles:** `turf_admin`, `super_admin`.

        A `turf_admin` owns exactly **one** turf — a second attempt fails with
        `TURF_ALREADY_EXISTS`; they add *grounds* to it instead. `super_admin` is a
        platform moderator, not an owner, and isn't capped.

        The owner is taken from the token. New turfs are created
        `pending_approval` and `verified: false` — **an unverified turf cannot take
        bookings** (`TURF_NOT_VERIFIED`), so verification is an out-of-band step.

        A valid map location is **required**: the events feed ranks matches by how
        near their turf is, so a turf without coordinates could never surface as
        "nearby".

        The turf and its grounds are created in one transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, address_line_1, grounds]
              properties:
                name:
                  type: string
                  description: The slug is derived from this.
                  example: Gulshan Sports Arena
                address_line_1:
                  type: object
                  required: [area, city, state, latitude, longitude]
                  description: |
                    BD address. `area` -> `address_line_1`, `city` (district) and
                    `state` (division) are required, as is a valid lat/lng.
                  properties:
                    area:
                      type: string
                      description: Area/street.
                      example: Road 11, Banani
                    city:
                      type: string
                      description: District.
                      example: Gulshan
                    state:
                      type: string
                      description: Division.
                      example: Dhaka
                    postal_code:
                      type: string
                      nullable: true
                      example: '1212'
                    country:
                      type: string
                      default: Bangladesh
                      example: Bangladesh
                    latitude:
                      type: number
                      format: double
                      minimum: -90
                      maximum: 90
                      example: 23.7925
                    longitude:
                      type: number
                      format: double
                      minimum: -180
                      maximum: 180
                      example: 90.4078
                grounds:
                  type: array
                  minItems: 1
                  description: At least one ground. Each needs a name, a sport, and an hourly rate.
                  items:
                    $ref: '#/components/schemas/GroundWrite'
                description:
                  type: string
                  nullable: true
                  example: Two floodlit 7-a-side pitches with parking.
                address_line_2:
                  type: string
                  nullable: true
                  example: House 42, Road 11
                phone:
                  type: string
                  nullable: true
                  example: '+8801812345678'
                email:
                  type: string
                  format: email
                  nullable: true
                  example: bookings@gulshanarena.com
                website_url:
                  type: string
                  format: uri
                  nullable: true
                  example: https://gulshanarena.com
                establishment_year:
                  type: integer
                  nullable: true
                  example: 2019
                rules_and_regulations:
                  type: string
                  nullable: true
                  example: No metal studs. Turf shoes only.
                cancellation_policy:
                  type: string
                  nullable: true
                  example: Free cancellation up to 2 days before.
                advance_booking_days:
                  type: integer
                  nullable: true
                  example: 30
                sports_available:
                  type: array
                  nullable: true
                  items:
                    type: string
                  example: [football]
                facilities:
                  type: array
                  nullable: true
                  items:
                    type: string
                  example: [parking, washroom, cafeteria]
                rating:
                  type: number
                  nullable: true
                  description: Seed value; defaults to 0. The live average overrides it on read.
                  example: 0
                operating_hours:
                  type: object
                  nullable: true
                  description: Optional. Stored as `{ open, close }`.
                  properties:
                    opening_time:
                      type: string
                      example: '06:00'
                    closing_time:
                      type: string
                      example: '23:59'
                images:
                  type: array
                  nullable: true
                  items:
                    type: string
                    format: uri
                  example:
                    - https://res.cloudinary.com/funturf/image/upload/v1718000000/images/arena.jpg
            example:
              name: Gulshan Sports Arena
              description: Two floodlit 7-a-side pitches with parking.
              address_line_1:
                area: Road 11, Banani
                city: Gulshan
                state: Dhaka
                postal_code: '1212'
                country: Bangladesh
                latitude: 23.7925
                longitude: 90.4078
              phone: '+8801812345678'
              advance_booking_days: 30
              facilities: [parking, washroom, cafeteria]
              operating_hours:
                opening_time: '06:00'
                closing_time: '23:59'
              grounds:
                - name: Ground A (7-a-side)
                  sport_type: [football]
                  hourly_rate: 2500
                  weekend_hourly_rate: 3000
                  capacity_players: 14
                  surface_type: artificial_grass
      responses:
        '201':
          description: Turf and grounds created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Venue'
        '400':
          description: |
            Missing name/grounds, an incomplete address, an invalid map location,
            or a ground without a name/sport/rate (`VALIDATION_ERROR`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: VALIDATION_ERROR
                message: A valid map location (latitude & longitude) is required — pick the turf on the map
                errors: []
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: You already own a turf (`TURF_ALREADY_EXISTS`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: TURF_ALREADY_EXISTS
                message: You already have a turf. Add grounds to it instead of creating another turf
                errors: []
                data: null

  /venues/create-ground:
    post:
      tags: [Venues]
      summary: Add a ground
      operationId: createGround
      description: |
        **Roles:** `turf_admin`, `super_admin`.

        Adds a ground to the caller's turf — since a `turf_admin` owns exactly one
        turf, "create turf" in the admin panel becomes "add ground" once that turf
        exists. A `super_admin` may target any turf via `turf_id` in the body.

        Only whitelisted columns are accepted: `turf_id` and `status` are set by
        the server, so a client can never attach a ground to someone else's turf.
        Blank strings become `null`.

        The turf's `total_grounds` and the union of its `sports_available` are kept
        in sync in the same transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/GroundWrite'
                - type: object
                  properties:
                    turf_id:
                      allOf:
                        - $ref: '#/components/schemas/Uuid'
                      description: '`super_admin` only — target a specific turf. Ignored for `turf_admin`.'
            example:
              name: Ground B (5-a-side)
              sport_type: [football]
              hourly_rate: 1800
              surface_type: artificial_grass
              capacity_players: 10
              amenities: [floodlights]
      responses:
        '201':
          description: Ground created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Ground'
        '400':
          description: |
            Missing name, no sport, or a rate that isn't greater than 0
            (`VALIDATION_ERROR`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: VALIDATION_ERROR
                message: A ground needs a name, at least one sport, and an hourly rate greater than 0
                errors: []
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: You don't own a turf yet (`NO_TURF_FOR_ADMIN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: NO_TURF_FOR_ADMIN
                message: Create your turf first, then add grounds to it
                errors: []
                data: null

  /venues/grounds/{ground_id}:
    patch:
      tags: [Venues]
      summary: Edit a ground
      operationId: updateGround
      description: |
        **Roles:** `turf_admin` (own turf only), `super_admin` (any).

        Partial update — only the columns present in the body are touched.
        `turf_id` is never settable. `status` **is** editable here, so an owner can
        flip a ground to `maintenance`/`unavailable` (which takes it out of
        booking).

        Fields that are present must stay valid: you cannot blank the name, clear
        every sport, or drop the rate to 0.
      parameters:
        - name: ground_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/GroundFields'
                - type: object
                  properties:
                    status:
                      type: string
                      enum: [available, maintenance, unavailable]
                      example: maintenance
              description: All fields optional — send only what changes.
            example:
              hourly_rate: 2800
              status: maintenance
              notes: Resurfacing until 30 July.
      responses:
        '200':
          description: Ground updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Ground'
        '400':
          description: |
            An empty name, no sports, or a non-positive rate (`VALIDATION_ERROR`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            The ground belongs to another admin's turf (`NOT_TURF_ADMIN`), or your
            role can't reach this route (`FORBIDDEN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such ground (`GROUND_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===========================================================================
  # Bookings
  # ===========================================================================
  /bookings/available-slots:
    get:
      tags: [Bookings]
      summary: Slot availability for a ground and date
      operationId: getAvailableSlots
      security:
        - bearerAuth: []
        - {}
      description: |
        The 16-slot grid for one ground on one date. Expired unpaid holds are
        reaped first, so what's reported is actually true.

        Read `held_slots` alongside the booleans: an unpaid hold does **not** flip
        a slot to `false`, so without it a held slot looks identical to a free one.
        Sending a token also populates `my_slots`, so a user's own booking isn't
        indistinguishable from a stranger's — and keys the rate limiter on the user
        rather than a shared IP.
      parameters:
        - name: ground
          in: query
          required: true
          description: Ground id.
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-07-20'
      responses:
        '200':
          description: The grid.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SlotGrid'
              example:
                success: true
                message: Available slots found
                statusCode: 200
                data:
                  ground_id: 2b3c4d5e-6f7a-4b8c-9d0e-1f2a3b4c5d6e
                  date: '2026-07-20T00:00:00.000Z'
                  t0000: true
                  t0130: true
                  t0300: true
                  t0430: true
                  t0600: true
                  t0730: true
                  t0900: true
                  t1030: true
                  t1200: true
                  t1330: true
                  t1500: true
                  t1630: true
                  t1800: false
                  t1930: true
                  t2100: true
                  t2230: true
                  held_slots: [t1930]
                  my_slots:
                    - code: t1930
                      booking_id: 8c2d1f0a-3b4e-4a5c-9d6e-7f8a9b0c1d2e
                      booking_status: pending
                      payment_status: pending
        '400':
          description: '`ground` or `date` missing (`VALIDATION_ERROR`).'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /bookings/quote:
    get:
      tags: [Bookings]
      summary: Price a slot
      operationId: calculateBookingPrice
      description: |
        Price preview for a slot, using the same maths as a real booking so the
        quote and the created booking always agree.

        Public, but sending a token matters: user- and group-targeted coupons only
        resolve when the booker is known, so an anonymous quote may show a smaller
        discount than the user would actually get.
      security:
        - bearerAuth: []
        - {}
      parameters:
        - name: ground_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: slot
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/SlotCode'
        - name: booking_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-07-20'
        - name: promo_code
          in: query
          required: false
          description: A coupon to apply. Invalid or inapplicable codes simply yield no discount.
          schema:
            type: string
          example: EID10
      responses:
        '200':
          description: The quote.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PriceQuote'
              example:
                success: true
                message: Success
                statusCode: 200
                data:
                  isAvailable: true
                  reason: null
                  slot: t1800
                  booking_date: '2026-07-20'
                  slot_time: '18:00'
                  day_of_week: 1
                  is_peak: true
                  is_weekend: false
                  base_rate: 3500
                  discount: 350
                  final_price: 3150
                  promotion:
                    id: 5d4c3b2a-1e0f-4a9b-8c7d-6e5f4a3b2c1d
                    code: EID10
        '400':
          description: A required query parameter is missing (`VALIDATION_ERROR`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such ground (`GROUND_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The slot is not bookable (`SLOT_UNAVAILABLE`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /bookings/create:
    post:
      tags: [Bookings]
      summary: Book a slot
      operationId: createBooking
      description: |
        Creates a booking on a ground + date + slot. Only **verified** turfs and
        **available** grounds are bookable.

        ### Paid vs unpaid

        A booking is *paid* if it carries a `transaction_id` or a
        `payment_proof_url`:

        - **Paid claim** — hard-**locks** the slot (the grid boolean flips to
          `false`) and awaits admin verification. It can supersede an unpaid
          holder, who is cancelled and notified.
        - **Unpaid booking** — a soft hold that does **not** lock the slot. Another
          user can still take it *with* payment. A second *unpaid* request on a held
          slot is rejected (`SLOT_HELD_UNPAID`). Holds expire after 2 hours and are
          capped at 4 per turf per user (`TOO_MANY_UNPAID_HOLDS`).

        ### Integrity

        Everything that mutates state runs in one transaction, arbitrated by a
        unique constraint on the slot claim — losing a concurrent race rolls the
        whole thing back and answers `SLOT_UNAVAILABLE`, which is what makes this
        double-booking-*proof* rather than merely unlikely. Notifications only fire
        after the commit.

        A `transaction_id` can back only one active booking
        (`DUPLICATE_TRANSACTION`), and a proof URL must be FunTurf-hosted
        (`INVALID_PAYMENT_PROOF`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ground_id, booking_date, slot]
              properties:
                ground_id:
                  $ref: '#/components/schemas/Uuid'
                booking_date:
                  type: string
                  format: date
                  description: |
                    Must be within the turf's window — not past
                    (`BOOKING_DATE_IN_PAST`) and not beyond `advance_booking_days`
                    (`BOOKING_TOO_FAR_AHEAD`).
                  example: '2026-07-20'
                slot:
                  $ref: '#/components/schemas/SlotCode'
                paid:
                  type: boolean
                  description: |
                    Declares a paid claim. If `true` you must also send a
                    `transaction_id` or `payment_proof_url`
                    (`PAYMENT_PROOF_REQUIRED`). Sending either of those implies
                    `paid` regardless of this flag.
                  example: true
                transaction_id:
                  type: string
                  nullable: true
                  description: Payment reference. Must not already back an active booking.
                  example: TRX8H2K9QX1
                payment_proof_url:
                  type: string
                  format: uri
                  nullable: true
                  description: Must be an image hosted by FunTurf — an admin opens it from the dashboard.
                  example: https://res.cloudinary.com/funturf/image/upload/v1718000000/images/proof-8h2k.jpg
                payment_method:
                  type: string
                  nullable: true
                  example: bkash
                promo_code:
                  type: string
                  nullable: true
                  description: Applied with the same rules as `/bookings/quote`.
                  example: EID10
                event_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Attach this reservation to a match **you organized**.
                notes:
                  type: string
                  nullable: true
                  example: Please keep the floodlights on until 20:00.
            examples:
              unpaidHold:
                summary: Unpaid soft hold (2h TTL)
                value:
                  ground_id: 2b3c4d5e-6f7a-4b8c-9d0e-1f2a3b4c5d6e
                  booking_date: '2026-07-20'
                  slot: t1800
              paidClaim:
                summary: Paid claim with a coupon
                value:
                  ground_id: 2b3c4d5e-6f7a-4b8c-9d0e-1f2a3b4c5d6e
                  booking_date: '2026-07-20'
                  slot: t1800
                  paid: true
                  transaction_id: TRX8H2K9QX1
                  payment_method: bkash
                  payment_proof_url: https://res.cloudinary.com/funturf/image/upload/v1718000000/images/proof-8h2k.jpg
                  promo_code: EID10
      responses:
        '201':
          description: Booking placed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Booking'
              example:
                success: true
                message: Booking placed — awaiting payment verification
                statusCode: 201
                data:
                  id: 8c2d1f0a-3b4e-4a5c-9d6e-7f8a9b0c1d2e
                  ground_id: 2b3c4d5e-6f7a-4b8c-9d0e-1f2a3b4c5d6e
                  user_id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                  event_id: null
                  booking_date: '2026-07-20T00:00:00.000Z'
                  total_amount: 3500
                  discount_amount: 350
                  final_amount: 3150
                  payment_status: partial
                  booking_status: pending
                  payment_method: bkash
                  transaction_id: TRX8H2K9QX1
                  payment_proof_url: https://res.cloudinary.com/funturf/image/upload/v1718000000/images/proof-8h2k.jpg
                  notes: null
                  slot:
                    code: t1800
                    start_time: '18:00'
                    end_time: '19:30'
                  created_at: '2026-07-16T18:12:00.000Z'
        '400':
          description: |
            Missing fields, a bad slot code (`INVALID_SLOT_CODE`), a paid claim
            with no proof (`PAYMENT_PROOF_REQUIRED`), a foreign proof URL
            (`INVALID_PAYMENT_PROOF`), or a date outside the window
            (`BOOKING_DATE_IN_PAST` / `BOOKING_TOO_FAR_AHEAD`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: PAYMENT_PROOF_REQUIRED
                message: A transaction number or payment proof is required for a paid booking
                errors: []
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            The turf isn't verified for bookings (`TURF_NOT_VERIFIED`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            No such ground (`GROUND_NOT_FOUND`) or event (`EVENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            The slot is taken or you lost the race (`SLOT_UNAVAILABLE`), it's held
            by another unpaid user (`SLOT_HELD_UNPAID`), you already booked it
            (`ALREADY_BOOKED_SLOT`), the ground is unavailable
            (`GROUND_NOT_AVAILABLE`), or the transaction id is reused
            (`DUPLICATE_TRANSACTION`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: SLOT_HELD_UNPAID
                message: This slot is held by an unpaid booking — book it with payment to take it
                errors: []
                data: null
        '429':
          description: |
            Rate limited (`RATE_LIMITED`), or you're sitting on too many unpaid
            holds at this turf (`TOO_MANY_UNPAID_HOLDS`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: TOO_MANY_UNPAID_HOLDS
                message: You've reached the limit of 4 unpaid holds at this turf. Pay for one or cancel it before holding another slot here
                errors: []
                data: null

  /bookings/my:
    get:
      tags: [Bookings]
      summary: Your bookings
      operationId: getMyBookings
      description: |
        Every booking the caller made, newest match date first. Dead holds are
        reaped first so the list reflects reality.

        Unpaid bookings carry `hold_expires_at` — the live 2-hour countdown, read
        from the slot lock. A hold the user can't see is a hold they'll lose.
      responses:
        '200':
          description: Your bookings.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:

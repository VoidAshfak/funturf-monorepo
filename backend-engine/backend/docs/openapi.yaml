                          bookings:
                            type: array
                            items:
                              allOf:
                                - $ref: '#/components/schemas/Booking'
                                - type: object
                                  properties:
                                    grounds:
                                      type: object
                                      description: The ground (incl. `sport_type`) and its turf.
                                    promotion_usage:
                                      type: array
                                      description: The applied coupon, for the ticket breakdown.
                                      items:
                                        type: object
              example:
                success: true
                message: 1 bookings
                statusCode: 200
                data:
                  bookings:
                    - id: 8c2d1f0a-3b4e-4a5c-9d6e-7f8a9b0c1d2e
                      ground_id: 2b3c4d5e-6f7a-4b8c-9d0e-1f2a3b4c5d6e
                      user_id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                      booking_date: '2026-07-20T00:00:00.000Z'
                      slot:
                        code: t1930
                        start_time: '19:30'
                        end_time: '21:00'
                      total_amount: 2500
                      discount_amount: 0
                      final_amount: 2500
                      booking_status: pending
                      payment_status: pending
                      hold_expires_at: '2026-07-16T20:12:00.000Z'
                      grounds:
                        id: 2b3c4d5e-6f7a-4b8c-9d0e-1f2a3b4c5d6e
                        name: Ground A (7-a-side)
                        sport_type: [football]
                        turfs:
                          id: 4d5e6f7a-8b9c-4d0e-1f2a-3b4c5d6e7f8a
                          name: Gulshan Sports Arena
                          city: Gulshan
                      promotion_usage: []
        '401':
          $ref: '#/components/responses/Unauthorized'

  /bookings/manage:
    get:
      tags: [Bookings]
      summary: Bookings you administer
      operationId: getManageBookings
      description: |
        **Roles:** `turf_admin` (own turfs only), `super_admin` (all).

        Each attached match carries its `event_trust` snapshot, so an admin can
        judge the game before confirming payment.
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by booking status.
          schema:
            $ref: '#/components/schemas/BookingStatus'
      responses:
        '200':
          description: Bookings on your turfs.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [bookings]
                        properties:
                          bookings:
                            type: array
                            items:
                              $ref: '#/components/schemas/BookingWithRelations'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /bookings/dashboard-stats:
    get:
      tags: [Bookings]
      summary: Dashboard analytics
      operationId: getDashboardStats
      description: |
        **Roles:** `turf_admin` (own turfs), `super_admin` (platform-wide).

        One roll-up for the Overview tab — KPIs, a 30-day series, status
        breakdown, top grounds by revenue, and three action lists.
      responses:
        '200':
          description: The roll-up.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardStats'
              example:
                success: true
                message: Dashboard stats
                statusCode: 200
                data:
                  kpis:
                    revenue_all: 842500
                    revenue_month: 96300
                    bookings_total: 412
                    bookings_month: 47
                    upcoming: 18
                    pending_verifications: 3
                    unique_players: 128
                    grounds: 2
                    turfs: 1
                    avg_rating: 4.6
                    rating_count: 38
                    occupancy_pct: 34.2
                  series:
                    - date: '2026-07-15'
                      bookings: 6
                      revenue: 14200
                    - date: '2026-07-16'
                      bookings: 4
                      revenue: 9450
                  status_breakdown:
                    - status: confirmed
                      count: 212
                    - status: pending
                      count: 41
                    - status: cancelled
                      count: 33
                  top_grounds:
                    - ground_id: 2b3c4d5e-6f7a-4b8c-9d0e-1f2a3b4c5d6e
                      name: Ground A (7-a-side)
                      revenue: 512000
                      bookings: 164
                  recent_bookings: []
                  upcoming_bookings: []
                  pending_verifications_list: []

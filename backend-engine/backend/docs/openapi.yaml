  # ===========================================================================
  # Turfmates
  # ===========================================================================
  /turfmates/turfmate-request:
    post:
      tags: [Turfmates]
      summary: Send a turfmate request
      operationId: sendTurfmateRequest
      description: |
        Opens a `pending` connection to another user and notifies them. Guards
        against self-requests and against a connection already existing in
        **either** direction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [receiverId]
              properties:
                receiverId:
                  allOf:
                    - $ref: '#/components/schemas/Uuid'
                  description: The user to connect with.
                message:
                  type: string
                  nullable: true
                  description: Optional note shown with the request.
                  example: We played at Gulshan last Friday — let's link up.
      responses:
        '201':
          description: Request sent.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Connection'
              example:
                success: true
                message: Turfmate request sent
                statusCode: 201
                data:
                  id: 9a8b7c6d-5e4f-4a3b-2c1d-0e9f8a7b6c5d
                  requester_id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                  recipient_id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                  status: pending
                  connection_type: friend
                  message: We played at Gulshan last Friday — let's link up.
                  created_at: '2026-07-16T19:00:00.000Z'
        '400':
          description: '`receiverId` missing, or it is your own id (`CANNOT_CONNECT_SELF`).'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: CANNOT_CONNECT_SELF
                message: You cannot send a turfmate request to yourself
                errors: []
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: The receiver does not exist (`USER_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            A connection or request already exists in either direction
            (`CONNECTION_ALREADY_EXISTS`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: CONNECTION_ALREADY_EXISTS
                message: This user has already sent you a turfmate request
                errors: []
                data: null

  /turfmates/get-pending-requests:
    get:
      tags: [Turfmates]
      summary: List incoming requests
      operationId: getPendingTurfmateRequests
      description: Requests awaiting the caller's response, newest first.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Pending requests.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [requests, pagination]
                        properties:
                          requests:
                            type: array
                            items:
                              type: object
                              required: [connectionId, user]
                              properties:
                                connectionId:
                                  $ref: '#/components/schemas/Uuid'
                                message:
                                  type: string
                                  nullable: true
                                created_at:
                                  type: string
                                  format: date-time
                                user:
                                  allOf:
                                    - $ref: '#/components/schemas/TurfmateProfile'
                                  description: The requester.
                          pagination:
                            $ref: '#/components/schemas/Pagination'
              example:
                success: true
                message: Pending turfmate requests
                statusCode: 200
                data:
                  requests:
                    - connectionId: 9a8b7c6d-5e4f-4a3b-2c1d-0e9f8a7b6c5d
                      message: We played at Gulshan last Friday — let's link up.
                      created_at: '2026-07-16T19:00:00.000Z'
                      user:
                        id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                        first_name: Shuvo
                        last_name: Islam
                        profile_picture_url: null
                        division: Dhaka
                        district: Gulshan
                        bio: Keeper. Always available.
                  pagination:
                    page: 1
                    limit: 20
                    total: 1
                    hasMore: false
        '401':
          $ref: '#/components/responses/Unauthorized'

  /turfmates/get-outgoing-requests:
    get:
      tags: [Turfmates]
      summary: List outgoing requests
      operationId: getOutgoingTurfmateRequests
      description: Requests the caller sent that are still pending.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Outgoing requests.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [requests, pagination]
                        properties:
                          requests:
                            type: array
                            items:
                              type: object
                              properties:
                                connectionId:
                                  $ref: '#/components/schemas/Uuid'
                                created_at:
                                  type: string
                                  format: date-time
                                user:
                                  allOf:
                                    - $ref: '#/components/schemas/TurfmateProfile'
                                  description: The recipient.
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /turfmates/accept-turfmate-request:
    post:
      tags: [Turfmates]
      summary: Accept a request
      operationId: acceptTurfmateRequest
      description: Only the **recipient** of a still-pending request may accept it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId]
              properties:
                requestId:
                  allOf:
                    - $ref: '#/components/schemas/Uuid'
                  description: The connection id (from the pending list).
      responses:
        '200':
          description: Accepted — you are now turfmates.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Connection'
              example:
                success: true
                message: Turfmate request accepted
                statusCode: 200
                data:
                  id: 9a8b7c6d-5e4f-4a3b-2c1d-0e9f8a7b6c5d
                  requester_id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                  recipient_id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                  status: accepted
                  responded_at: '2026-07-16T19:20:00.000Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: |
            No pending request with that id addressed to you
            (`CONNECTION_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /turfmates/reject-turfmate-request:
    post:
      tags: [Turfmates]
      summary: Decline a request
      operationId: rejectTurfmateRequest
      description: |
        Recipient-only. Marks the connection `rejected` (the row is kept, so the
        same requester cannot immediately re-send).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId]
              properties:
                requestId:
                  $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Declined.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No such pending request (`CONNECTION_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /turfmates/cancel-turfmate-request:
    post:
      tags: [Turfmates]
      summary: Withdraw a request you sent
      operationId: cancelTurfmateRequest
      description: |
        Requester-only. **Hard-deletes** the row (unlike reject), so the request
        can be sent again later.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId]
              properties:
                requestId:
                  $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Withdrawn.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          connectionId:
                            $ref: '#/components/schemas/Uuid'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No such pending request you sent (`CONNECTION_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /turfmates/remove-turfmate:
    post:
      tags: [Turfmates]
      summary: Remove a turfmate
      operationId: removeTurfmate
      description: Either party may unfriend. Hard-deletes the accepted connection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  allOf:
                    - $ref: '#/components/schemas/Uuid'
                  description: The turfmate to remove.
      responses:
        '200':
          description: Removed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          userId:
                            $ref: '#/components/schemas/Uuid'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: You are not turfmates (`CONNECTION_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: CONNECTION_NOT_FOUND
                message: You are not turfmates
                errors: []
                data: null

  /turfmates/get-turfmates:
    get:
      tags: [Turfmates]
      summary: List your turfmates
      operationId: getTurfmates
      description: Accepted connections as full profiles, most recently connected first.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Turfmates.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [turfmates, pagination]
                        properties:
                          turfmates:
                            type: array
                            items:
                              allOf:
                                - $ref: '#/components/schemas/TurfmateProfile'
                                - type: object
                                  properties:
                                    connected_since:
                                      type: string
                                      format: date-time
                                      description: When the request was accepted.
                                      example: '2026-05-04T10:00:00.000Z'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /turfmates/get-mutual-turfmates:
    get:
      tags: [Turfmates]
      summary: Mutual turfmates with another user
      operationId: getMutualTurfmates
      description: |
        Profiles connected to **both** the caller and `userTwo`.

        Note: `data` is a bare array here, not an object.
      parameters:
        - name: userTwo
          in: query
          required: true
          description: The other user to intersect against.
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Mutual turfmates.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TurfmateProfile'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /turfmates/recommendations:
    get:
      tags: [Turfmates]
      summary: Suggested turfmates
      operationId: getTurfmateRecommendations
      description: |
        People to connect with, ranked by mutual turfmates first, then area
        proximity (same district > shared activity city > same division). Anyone
        the caller already has any connection with is excluded.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 30
            default: 10
          example: 10
      responses:
        '200':
          description: Recommendations (may be empty).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [recommendations]
                        properties:
                          recommendations:
                            type: array
                            items:
                              allOf:
                                - $ref: '#/components/schemas/TurfmateProfile'
                                - type: object
                                  properties:
                                    mutual_turfmates:
                                      type: integer
                                      example: 3
                                    has_mutual:
                                      type: boolean
                                      description: Highlight flag for the card.
                                      example: true
                                    reason:
                                      type: string
                                      description: Human-readable rationale for the suggestion.
                                      example: Plays in Gulshan
              example:
                success: true
                message: Turfmate recommendations
                statusCode: 200
                data:
                  recommendations:
                    - id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                      first_name: Shuvo
                      last_name: Islam
                      profile_picture_url: null
                      division: Dhaka
                      district: Gulshan
                      bio: Keeper. Always available.
                      mutual_turfmates: 3
                      has_mutual: true
                      reason: Plays in Gulshan
        '401':
          $ref: '#/components/responses/Unauthorized'

  /turfmates/connection-status/{userId}:
    get:
      tags: [Turfmates]
      summary: Relationship with another user
      operationId: getConnectionStatus
      description: |
        Drives the profile page's button state. `direction` is only meaningful
        while `pending` — it says who needs to act.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: The relationship.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [status]
                        properties:
                          status:
                            type: string
                            description: '`self` when asking about yourself; `none` when unconnected.'
                            enum: [self, none, pending, accepted, rejected, blocked]
                            example: pending
                          direction:
                            type: string
                            nullable: true
                            description: '`null` unless `status` is `pending`.'
                            enum: [outgoing, incoming]
                            example: incoming
                          connectionId:
                            $ref: '#/components/schemas/Uuid'
              example:
                success: true
                message: Connection status
                statusCode: 200
                data:
                  status: pending
                  direction: incoming
                  connectionId: 9a8b7c6d-5e4f-4a3b-2c1d-0e9f8a7b6c5d
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ===========================================================================
  # Events
  # ===========================================================================
  /events:
    get:
      tags: [Events]
      summary: Browse matches (ranked, paginated)
      operationId: getEvents
      security:
        - bearerAuth: []
        - {}
      description: |
        The infinite-scroll feed. Ranking, filtering and pagination happen in SQL
        (`utils/eventRanking.js`); the feed personalises when a token is present —
        proximity to the caller's home location and turfmate involvement switch on.

        `stats` is global and unfiltered, and is returned on **page 1 only** (the
        client keeps it for the hero + sport chips).
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
        - name: sport
          in: query
          description: Exact `sport_type`. `all` matches any.
          schema:
            type: string
          example: football
        - name: timeframe
          in: query
          description: Filters `event_date` forward from today.
          schema:
            type: string
            enum: [all, today, week, month]
            default: all
        - name: q
          in: query
          description: Case-insensitive search over match title and turf name.
          schema:
            type: string
          example: friday
        - name: openOnly
          in: query
          description: '`true` -> only matches still needing players.'
          schema:
            type: string
            enum: ['true', 'false']
        - name: joinedOnly
          in: query
          description: >-
            `true` -> return ONLY matches the caller is already involved in (as
            organiser or any participant row: approved player, co-organiser, or a
            pending request/invite). Requires an authenticated caller; ignored for
            anonymous requests. Pairs with the per-event `my_role` field.
          schema:
            type: string
            enum: ['true', 'false']
      responses:
        '200':
          description: A page of matches.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [events, pagination]
                        properties:
                          events:
                            type: array
                            items:
                              $ref: '#/components/schemas/EventFeedItem'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
                          stats:
                            type: object
                            description: Page 1 only.
                            properties:
                              total:
                                type: integer
                                example: 218
                              open:
                                type: integer
                                description: Matches still short of `min_players`.
                                example: 64
                              sports:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    name:
                                      type: string
                                      example: football
                                    count:
                                      type: integer
                                      example: 180
              example:
                success: true
                message: 1 events found
                statusCode: 200
                data:
                  events:
                    - id: 1a2b3c4d-5e6f-4a7b-8c9d-0e1f2a3b4c5d
                      title: Friday Night 7s
                      description: Casual 7-a-side. Bring a dark and a light shirt.
                      organizer_id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                      users:
                        id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                        first_name: Rafi
                        last_name: Ahmed
                        profile_picture_url: null
                      sport_type: football
                      event_date: '2026-07-24'
                      start_time: '18:00'
                      end_time: '19:30'
                      min_players: 10
                      max_players: 14
                      current_players: 11
                      booking_id: 8c2d1f0a-3b4e-4a5c-9d6e-7f8a9b0c1d2e
                      grounds:
                        id: 2b3c4d5e-6f7a-4b8c-9d0e-1f2a3b4c5d6e
                        name: Ground A (7-a-side)
                        turfs:
                          id: 4d5e6f7a-8b9c-4d0e-1f2a-3b4c5d6e7f8a
                          name: Gulshan Sports Arena
                          address_line_1: House 42, Road 11
                      event_participants:
                        - user_id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                          status: approved
                          users:
                            id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                            first_name: Shuvo
                            profile_picture_url: null
                      turfmates_involved:
                        - id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                          first_name: Shuvo
                          profile_picture_url: null
                      my_role: player
                  pagination:
                    page: 1
                    limit: 12
                    total: 1
                    hasMore: false
                  stats:
                    total: 218
                    open: 64
                    sports:
                      - name: football
                        count: 180
                      - name: cricket
                        count: 38

  /events/my-events:
    get:
      tags: [Events]
      summary: Matches you take part in
      operationId: getUserEvents
      description: |
        Every match the caller has a participant row for, with their own
        participation attached. Ordered by match date.

        Note: `status` filters the **participation** status, not the event status.
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by your participation status.
          schema:
            $ref: '#/components/schemas/ParticipantStatus'
      responses:
        '200':
          description: Your matches.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [events]
                        properties:
                          events:
                            type: array
                            description: The raw event row, plus `my_participation`.
                            items:
                              type: object
                              properties:
                                id:
                                  $ref: '#/components/schemas/Uuid'
                                title:

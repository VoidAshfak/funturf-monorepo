  /venues/{venue_id}/rating:
    post:
      tags: [Venues]
      summary: Rate a turf
      operationId: rateTurf
      description: |
        One rating per user per turf, enforced as an upsert — the first call
        creates it, later calls **update** the same row, so a user can raise or
        lower their score but never stack multiple.

        After writing, the turf's stored `rating` is recomputed as the average of
        all approved turf reviews.
      parameters:
        - name: venue_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  description: A whole number from 1 to 5.
                  example: 5
                title:
                  type: string
                  nullable: true
                  example: Great surface
                comment:
                  type: string
                  nullable: true
                  example: Well kept pitch, floodlights are excellent.
      responses:

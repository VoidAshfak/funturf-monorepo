  /events/nearby:
    get:
      tags: [Events]
      summary: Find matches near a point
      operationId: getNearbyEvents
      security: []
      description: |
        Upcoming, `public`, live (`open`/`ready`/`booked`) matches within `radius`
        km of a coordinate, nearest first, capped at 50.

        Distance is a plain haversine over turf coordinates — turfs are required to
        have coordinates at creation, so a turf without them can never surface.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
          example: 23.7925
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
          example: 90.4078
        - name: radius
          in: query
          required: false
          description: Search radius in km. Clamped to 1..100.
          schema:
            type: number
            minimum: 1
            maximum: 100
            default: 10
          example: 5
      responses:
        '200':
          description: Nearby matches.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [events, search_radius_km, center]
                        properties:
                          events:
                            type: array
                            items:
                              $ref: '#/components/schemas/NearbyEvent'
                          search_radius_km:
                            type: number
                            description: The radius actually used, after clamping.
                            example: 5
                          center:
                            type: object
                            properties:
                              lat:
                                type: number
                                example: 23.7925
                              lng:
                                type: number
                                example: 90.4078
              example:
                success: true
                message: 1 nearby matches found
                statusCode: 200
                data:
                  events:
                    - id: 1a2b3c4d-5e6f-4a7b-8c9d-0e1f2a3b4c5d
                      title: Friday Night 7s
                      sport_type: football
                      event_date: '2026-07-24'
                      start_time: '18:00:00'
                      end_time: '19:30:00'
                      min_players: 10
                      max_players: 14
                      current_players: 11
                      turf_id: 4d5e6f7a-8b9c-4d0e-1f2a-3b4c5d6e7f8a
                      turf_name: Gulshan Sports Arena
                      turf_city: Gulshan
                      ground_name: Ground A (7-a-side)
                      distance_km: 2.4
                  search_radius_km: 5
                  center:
                    lat: 23.7925
                    lng: 90.4078
        '400':
          description: '`lat`/`lng` missing or unparseable (`VALIDATION_ERROR`).'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/create-event:
    post:
      tags: [Events]
      summary: Create a match
      operationId: createEvent
      description: |
        The organizer is taken from the token — `organizer_id` in the body is
        ignored.

        **Schedule + venue come from exactly one of two sources:**

        - **With `booking_id`** — date, times, venue and ground are derived from
          that booking; any schedule/venue fields in the body are ignored, so the
          two can never disagree. The booking must be yours and not already
          attached to another match.
        - **Without `booking_id`** — you must supply `event_date`, `start_time`,
          `end_time`, `venue_id` and `ground_id` as a *probable* plan.

        `current_players` is a list of hand-picked players who join **approved**
        outright (they never appear in the request queue). The stored counter
        becomes `current_players.length + 1` — the organizer plays too.

        On success the organizer's turfmates are notified, at a priority that
        scales with how soon the match is.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - sport_type
                - event_type
                - max_players
                - min_Players
                - current_players
                - skill_level_required
                - total_cost
                - cost_split_type
              properties:
                title:
                  type: string
                  example: Friday Night 7s
                description:
                  type: string
                  nullable: true
                  example: Casual 7-a-side. Bring a dark and a light shirt.
                sport_type:
                  type: string
                  example: football
                event_type:
                  type: string
                  example: friendly
                max_players:
                  type: integer
                  example: 14
                min_Players:
                  type: integer
                  description: '**Note the capital `P`** — this exact spelling is required.'
                  example: 10
                current_players:
                  type: array
                  description: |
                    Hand-picked initial squad, approved on creation. Send `[]` for
                    none — the field is required and must be an array (its
                    `.length` is read).
                  items:
                    type: object
                    required: [value]
                    properties:
                      value:
                        allOf:
                          - $ref: '#/components/schemas/Uuid'
                        description: The player's user id.
                      label:
                        type: string
                        description: Ignored by the server; convenient for picker UIs.
                        example: Shuvo Islam
                  example:
                    - value: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                      label: Shuvo Islam
                skill_level_required:
                  type: string
                  example: intermediate
                total_cost:
                  type: number
                  format: double
                  example: 3500
                cost_split_type:
                  type: string
                  example: equal
                booking_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: |
                    An existing booking of yours to run this match on. When set,
                    the schedule and venue below are ignored and derived from it.
                team_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: |
                    Optional — organize this match under one of your teams. You must
                    be an ACTIVE member of it (any role), else `NOT_TEAM_MEMBER`.
                    Purely an organizing tag: the join/invite/roster flow is
                    unchanged, and the team's roster is **not** auto-invited.
                    Omit it for an ordinary teamless match.
                event_date:
                  type: string
                  format: date
                  description: Required when no `booking_id`.
                  example: '2026-07-24'
                start_time:
                  type: string
                  description: '`HH:MM`. Required when no `booking_id`.'
                  example: '18:00'
                end_time:
                  type: string
                  description: '`HH:MM`. Required when no `booking_id`.'
                  example: '19:30'
                venue_id:
                  allOf:
                    - $ref: '#/components/schemas/Uuid'
                  description: Required when no `booking_id`.
                ground_id:
                  allOf:
                    - $ref: '#/components/schemas/Uuid'
                  description: Required when no `booking_id`.
            examples:
              probableTime:
                summary: No booking yet — a probable time
                value:
                  title: Friday Night 7s
                  description: Casual 7-a-side. Bring a dark and a light shirt.
                  sport_type: football
                  event_type: friendly
                  event_date: '2026-07-24'
                  start_time: '18:00'
                  end_time: '19:30'
                  venue_id: 4d5e6f7a-8b9c-4d0e-1f2a-3b4c5d6e7f8a
                  ground_id: 2b3c4d5e-6f7a-4b8c-9d0e-1f2a3b4c5d6e
                  max_players: 14
                  min_Players: 10
                  current_players: []
                  skill_level_required: intermediate
                  total_cost: 3500
                  cost_split_type: equal
              withBooking:
                summary: Backed by an existing booking
                value:
                  title: Friday Night 7s
                  sport_type: football
                  event_type: friendly
                  booking_id: 8c2d1f0a-3b4e-4a5c-9d6e-7f8a9b0c1d2e
                  max_players: 14
                  min_Players: 10
                  current_players:
                    - value: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                  skill_level_required: intermediate
                  total_cost: 3500
                  cost_split_type: equal
      responses:
        '200':
          description: |
            Match created. Note this returns **200**, not 201, and the payload is
            the raw row from `fn_create_event` (not the serialized DTO).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        description: Raw `events` row.
              example:
                success: true
                message: Event created successfully
                statusCode: 200
                data:
                  id: 1a2b3c4d-5e6f-4a7b-8c9d-0e1f2a3b4c5d
                  organizer_id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                  title: Friday Night 7s
                  sport_type: football
                  event_date: '2026-07-24'
                  start_time: '18:00:00'
                  end_time: '19:30:00'
                  min_players: 10
                  max_players: 14
                  current_players: 1
                  status: open
                  created_at: '2026-07-16T19:40:00.000Z'
        '400':
          description: |
            A required field is missing, or no booking was given and the probable
            time/venue is incomplete (`VALIDATION_ERROR`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: VALIDATION_ERROR
                message: Pick a venue, ground and a probable time, or attach a booking
                errors: []
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: The booking to attach does not exist (`BOOKING_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            The booking is already tied to another match
            (`BOOKING_ALREADY_ATTACHED`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/update-event/{event_id}:
    patch:
      tags: [Events]
      summary: Edit a match
      operationId: editEvent
      description: |
        Organizer-only, partial update. A `completed` or `cancelled` match is a
        historical record and is locked (`EVENT_NOT_EDITABLE`) — reuse it via
        **Rematch** instead.

        Not editable: `organizer_id` (ownership can't be transferred) and
        `current_players` (derived from the roster).

        **Booking / schedule interplay** — `booking_id`'s presence signals intent:

        | Body | Effect |
        |---|---|
        | `booking_id: "<uuid>"` | Attach it; ground/venue/time all sync **from** the booking. |
        | `booking_id: null` or `""` | Detach; the time stays put and becomes an editable probable range. |
        | field omitted | Whatever is attached now stays attached. |

        Sending `event_date`/`start_time`/`end_time` for a match that will still
        have a booking (and isn't attaching a new one) is rejected with
        `EVENT_SCHEDULE_LOCKED`.

        **Change notifications** — every edit that actually changes a value is
        announced (`event_reminder`), naming the changed fields in the message and
        listing their column names in `data.changed`. The tier controls priority
        and audience:

        | Tier | Fields | Priority | Audience |
        |---|---|---|---|
        | High impact | schedule, venue/ground, booking attach/detach, sport, match type, entry fee, total cost, cost split, min/max players, skill level, age group, gender preference, visibility, join approval | scales with how soon the match is (`urgent` today → `medium`) | approved squad **+ pending join-requesters** |
        | Cosmetic | title, description, rules, what to bring | `low` | approved squad |

        The acting organizer is never notified of their own edit. High-impact
        changes reach pending requesters because a fee, time or eligibility change
        decides whether they still want in. `data.high_impact` carries the tier.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Send only the fields you want to change.
              properties:
                title:
                  type: string
                  example: Friday Night 7s (rescheduled)
                description:
                  type: string
                  nullable: true
                sport_type:
                  type: string
                  example: football
                event_type:
                  type: string
                  example: friendly
                ground_id:
                  $ref: '#/components/schemas/Uuid'
                venue_id:
                  $ref: '#/components/schemas/Uuid'
                max_players:
                  type: integer
                  description: Cannot drop below the current approved squad.
                  example: 16
                min_players:
                  type: integer
                  description: '`>= 1` and `<= max_players`. Lowercase `p` here (unlike create).'
                  example: 10
                skill_level_required:
                  type: string
                  example: intermediate
                age_group:
                  type: string
                  nullable: true
                  example: 18-35
                gender_preference:
                  type: string
                  nullable: true
                  example: any
                visibility:
                  type: string
                  enum: [public, private, turfmates_only]
                join_approval_required:
                  type: boolean
                  example: true
                entry_fee:
                  type: number
                  format: double
                  description: Cannot be negative.
                  example: 300
                total_cost:
                  type: number
                  format: double
                  description: Cannot be negative.
                  example: 3500
                cost_split_type:
                  type: string
                  example: equal
                rules:
                  type: string
                  nullable: true
                  example: No slide tackles.
                what_to_bring:
                  type: string
                  nullable: true
                  example: Dark and light shirt, turf shoes.
                booking_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: See the table above — presence signals attach/detach intent.
                event_date:
                  type: string
                  format: date
                  description: Only accepted when the match will have no booking.
                  example: '2026-07-25'
                start_time:
                  type: string
                  description: Only accepted when the match will have no booking.
                  example: '19:00'
                end_time:
                  type: string
                  description: Only accepted when the match will have no booking.
                  example: '20:30'
            examples:
              cosmetic:
                summary: Rename and raise the cap
                value:
                  title: Friday Night 7s (rescheduled)
                  max_players: 16
              detachAndSetProbable:
                summary: Detach the booking and set a probable time
                value:
                  booking_id: null
                  event_date: '2026-07-25'
                  start_time: '19:00'
                  end_time: '20:30'
      responses:
        '200':
          description: Updated. Returns the raw event row.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
        '400':
          description: |
            Bad player limits (`INVALID_PLAYER_LIMITS`), negative money, or a
            missing event id (`BAD_REQUEST`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: INVALID_PLAYER_LIMITS
                message: Player limits are invalid (max must be at least the current squad and not below the minimum)
                errors: []
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: You are not the organizer (`NOT_EVENT_ORGANIZER`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such match (`EVENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            The match is completed/cancelled (`EVENT_NOT_EDITABLE`), or you tried
            to hand-set the time on a booked match (`EVENT_SCHEDULE_LOCKED`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: EVENT_SCHEDULE_LOCKED
                message: This match's time is set by its attached booking — detach the booking to set a probable time
                errors: []
                data: null

  /events/delete-event:
    delete:
      tags: [Events]
      summary: Cancel a match
      operationId: deleteEvent
      description: |
        Organizer-only. Despite the name this is a **soft cancel**
        (`status -> cancelled`), never a row delete: a match accretes chat,
        comments, payments, reviews and reputation that the platform depends on.
        Cancelling keeps every record, drops the match out of the active feeds, and
        frees any attached booking (the reservation itself is kept — it may be
        paid for).

        The confirmed squad is notified. Already `cancelled`/`completed` matches
        are rejected.

        Note: the event id goes in the **request body**, not the path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_id]
              properties:
                event_id:
                  $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Match cancelled. Returns the updated event row.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
              example:
                success: true
                message: Match cancelled
                statusCode: 200
                data:
                  id: 1a2b3c4d-5e6f-4a7b-8c9d-0e1f2a3b4c5d
                  title: Friday Night 7s
                  status: cancelled
                  booking_id: null
        '400':
          description: '`event_id` missing (`BAD_REQUEST`).'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: You are not the organizer (`NOT_EVENT_ORGANIZER`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such match (`EVENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Already cancelled or completed (`EVENT_NOT_EDITABLE`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


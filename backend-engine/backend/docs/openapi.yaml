  /events/{event_id}/rematch:
    post:
      tags: [Events]
      summary: Clone a match to a new date
      operationId: rematchEvent
      description: |
        Event-admin only. Creates a **new** match copying the source's rules and
        preferences, and re-invites the same squad.

        Why a clone and not an edit: a finished match is a permanent record — its
        chat, comments and ratings must stay attached to what actually happened.

        The prior squad (plus the source organizer, minus the caller) come in as
        `invited`, not `requested` — the organizer pulled them in, so **they**
        decide via `/invitation/accept|decline`. An invite consumes no slot until
        accepted. `booking_id` is deliberately not copied: a new session needs its
        own reservation.
      parameters:
        - name: event_id
          in: path
          required: true
          description: The source match to clone.
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_date, start_time, end_time]
              properties:
                event_date:
                  type: string
                  format: date
                  description: Cannot be in the past.
                  example: '2026-07-31'
                start_time:
                  type: string
                  example: '18:00'
                end_time:
                  type: string
                  example: '19:30'
      responses:
        '201':
          description: Rematch created and the squad invited.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        description: The new raw event row.
              example:
                success: true
                message: Rematch created — your squad has been invited
                statusCode: 201
                data:
                  id: 5e6f7a8b-9c0d-4e1f-2a3b-4c5d6e7f8a9b
                  organizer_id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                  title: Friday Night 7s
                  event_date: '2026-07-31'
                  start_time: '18:00:00'
                  end_time: '19:30:00'
                  current_players: 1
                  status: open
        '400':
          description: |
            Missing date/times (`VALIDATION_ERROR`) or a past date
            (`BOOKING_DATE_IN_PAST`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: BOOKING_DATE_IN_PAST
                message: The rematch date cannot be in the past
                errors: []
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not an admin of the source match (`NOT_EVENT_ADMIN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Source match not found (`EVENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/{event_id}/join:
    post:
      tags: [Events]
      summary: Request to join
      operationId: joinEvent
      description: |
        Every join is a **pending request** an event admin must approve — it does
        not consume a slot or bump `current_players` yet. All admins are notified;
        the requester is not (their own action is toasted client-side).

        Any existing participant row — pending, approved or invited — blocks a new
        request (`ALREADY_JOINED`).
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '201':
          description: Request sent.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EventParticipant'
              example:
                success: true
                message: Join request sent
                statusCode: 201
                data:
                  id: 6f7a8b9c-0d1e-4f2a-3b4c-5d6e7f8a9b0c
                  event_id: 1a2b3c4d-5e6f-4a7b-8c9d-0e1f2a3b4c5d
                  user_id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                  status: requested
                  role: player
                  joined_at: '2026-07-16T19:55:00.000Z'
        '400':
          description: You are the organizer, or the id is missing (`VALIDATION_ERROR` / `BAD_REQUEST`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No such match (`EVENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            You already have a row on this match (`ALREADY_JOINED`), the squad is
            full (`EVENT_FULL`), or the match is cancelled/completed
            (`EVENT_NOT_EDITABLE`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: EVENT_FULL
                message: This match is already full
                errors: []
                data: null
    delete:
      tags: [Events]
      summary: Withdraw your join request
      operationId: cancelJoinRequest
      description: |
        Requester-only, and only while still `requested`. A pending request never
        consumed a slot, so nothing is decremented — the row is deleted and the
        admins' queue is cleaned up.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Withdrawn.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          event_id:
                            $ref: '#/components/schemas/Uuid'
        '400':
          description: Missing event id (`BAD_REQUEST`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: You have no pending request here (`JOIN_REQUEST_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/{event_id}/leave:
    delete:
      tags: [Events]
      summary: Leave a match
      operationId: leaveEvent
      description: |
        Deletes the caller's participant row. `current_players` is decremented
        only if they were `approved` (a pending request never occupied a slot);
        the counter is clamped at 0.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Left the match.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          event_id:
                            $ref: '#/components/schemas/Uuid'
        '400':
          description: You are not a participant (`NOT_EVENT_PARTICIPANT`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /events/{event_id}/invitation/accept:
    post:
      tags: [Events]
      summary: Accept an invitation
      operationId: acceptEventInvitation
      description: |
        Invitee-only. Flips the caller's own `invited` row to `approved` and
        consumes a slot — capacity is enforced here, since an invite reserves
        nothing in advance.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: You're in.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          event_id:
                            $ref: '#/components/schemas/Uuid'
              example:
                success: true
                message: Invitation accepted — you're in!
                statusCode: 200
                data:
                  event_id: 1a2b3c4d-5e6f-4a7b-8c9d-0e1f2a3b4c5d
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: |
            No pending invitation for you (`INVITATION_NOT_FOUND`), or no such
            match (`EVENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The squad filled up before you accepted (`EVENT_FULL`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/{event_id}/invitation/decline:
    post:
      tags: [Events]
      summary: Decline an invitation
      operationId: declineEventInvitation
      description: |
        Invitee-only. **Deletes** the invite row — deliberately, so the user stays
        free to request a spot the normal way later (a join is blocked while any
        participant row exists). An invite never consumed a slot, so nothing is
        decremented.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Declined.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          event_id:
                            $ref: '#/components/schemas/Uuid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No pending invitation for you (`INVITATION_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/{event_id}/requests:
    get:
      tags: [Events]
      summary: List pending join requests
      operationId: getJoinRequests
      description: |
        Event-admin only (organizer + co-organizers). Only `requested` rows —
        `invited` players never appear in the approval queue.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: The request queue, oldest first.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [requests]
                        properties:
                          requests:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  $ref: '#/components/schemas/Uuid'
                                user_id:
                                  $ref: '#/components/schemas/Uuid'
                                joined_at:
                                  type: string
                                  format: date-time
                                users:
                                  $ref: '#/components/schemas/UserSummary'
              example:
                success: true
                message: 1 pending requests
                statusCode: 200
                data:
                  requests:
                    - id: 6f7a8b9c-0d1e-4f2a-3b4c-5d6e7f8a9b0c
                      user_id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                      joined_at: '2026-07-16T19:55:00.000Z'
                      users:
                        id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                        first_name: Shuvo
                        last_name: Islam
                        profile_picture_url: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not an event admin (`NOT_EVENT_ADMIN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such match (`EVENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/{event_id}/requests/{user_id}/accept:
    post:
      tags: [Events]
      summary: Approve a join request
      operationId: acceptJoinRequest
      description: |
        Event-admin only. Consumes a slot: flips the row to `approved` and bumps
        `current_players`. Capacity is hard-enforced here.

        Notifies the requester (high — the decision they were waiting on), the
        other admins (low), and the new player's turfmates.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: user_id
          in: path
          required: true
          description: The requester to approve.
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Approved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          event_id:
                            $ref: '#/components/schemas/Uuid'
                          user_id:
                            $ref: '#/components/schemas/Uuid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not an event admin (`NOT_EVENT_ADMIN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            No pending request from that user (`JOIN_REQUEST_NOT_FOUND`) or no such
            match (`EVENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The squad is full (`EVENT_FULL`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/{event_id}/requests/{user_id}/reject:
    post:
      tags: [Events]
      summary: Decline a join request
      operationId: rejectJoinRequest
      description: Event-admin only. Marks the row `rejected` and notifies the requester.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Declined.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          event_id:
                            $ref: '#/components/schemas/Uuid'
                          user_id:
                            $ref: '#/components/schemas/Uuid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not an event admin (`NOT_EVENT_ADMIN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No pending request from that user (`JOIN_REQUEST_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/{event_id}/admins:
    post:
      tags: [Events]
      summary: Grant event admin
      operationId: grantEventAdmin
      description: |
        **Organizer-only** — only the creator can mint admins. The target must
        already be an `approved` participant; they are promoted to `co_organizer`,
        which lets them review join requests and moderate.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  allOf:
                    - $ref: '#/components/schemas/Uuid'
                  description: An approved participant to promote.
      responses:
        '200':
          description: Promoted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          event_id:
                            $ref: '#/components/schemas/Uuid'
                          user_id:
                            $ref: '#/components/schemas/Uuid'
        '400':
          description: |
            `user_id` missing, or it is your own id — you are already the organizer
            (`VALIDATION_ERROR`). Also `NOT_EVENT_PARTICIPANT` when the target
            isn't on the approved squad.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: You are not the organizer (`NOT_EVENT_ORGANIZER`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such match (`EVENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Already a co-organizer (`ALREADY_ADMIN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/{event_id}/admins/{user_id}:
    delete:
      tags: [Events]
      summary: Revoke event admin
      operationId: revokeEventAdmin
      description: Organizer-only. Demotes a `co_organizer` back to `player`.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Demoted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          event_id:
                            $ref: '#/components/schemas/Uuid'
                          user_id:
                            $ref: '#/components/schemas/Uuid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            You are not the organizer (`NOT_EVENT_ORGANIZER`), or that user is not
            a co-organizer (`NOT_EVENT_ADMIN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such match (`EVENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===========================================================================
  # Event Discussion (comments)
  # ===========================================================================
  /events/{event_id}/comments:
    get:
      tags: [Event Discussion]
      summary: Read the discussion
      operationId: getComments
      security:
        - bearerAuth: []
        - {}
      description: |
        **Public** — the thread is social proof that a match is real, so signed-out
        visitors can read it. Returns a flat list (the client nests it); pinned
        comments sort first, then oldest to newest.

        With a token, `liked_by_me` is filled in so the like button paints in the
        right state, and `can_comment` tells the client whether to show a composer
        or a "join the match to take part" prompt.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: The thread.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [comments, can_comment]
                        properties:
                          comments:
                            type: array
                            items:
                              $ref: '#/components/schemas/Comment'
                          can_comment:
                            type: boolean
                            description: '`false` for anonymous callers and non-members.'
              example:
                success: true
                message: 2 comments
                statusCode: 200
                data:
                  comments:
                    - id: 0d1e2f3a-4b5c-4d6e-7f8a-9b0c1d2e3f4a
                      event_id: 1a2b3c4d-5e6f-4a7b-8c9d-0e1f2a3b4c5d
                      parent_comment_id: null
                      content: Who's bringing the ball?
                      is_deleted: false
                      is_edited: false
                      is_pinned: false
                      likes_count: 3
                      liked_by_me: true
                      created_at: '2026-07-16T12:00:00.000Z'
                      edited_at: null
                      author:
                        id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                        first_name: Rafi
                        last_name: Ahmed
                        profile_picture_url: null
                      user_id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                    - id: 1e2f3a4b-5c6d-4e7f-8a9b-0c1d2e3f4a5b
                      event_id: 1a2b3c4d-5e6f-4a7b-8c9d-0e1f2a3b4c5d
                      parent_comment_id: 0d1e2f3a-4b5c-4d6e-7f8a-9b0c1d2e3f4a
                      content: null
                      is_deleted: true
                      is_edited: false
                      is_pinned: false
                      likes_count: 0
                      liked_by_me: false
                      created_at: '2026-07-16T12:04:00.000Z'
                      edited_at: null
                      author: null
                      user_id: null
                  can_comment: true
        '404':
          description: No such match (`EVENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Event Discussion]
      summary: Post a comment or reply
      operationId: createComment
      description: |
        Writing is **earned**: only the organizer, a co-organizer, or a participant
        whose join request was approved may post (`CANNOT_COMMENT` otherwise). A
        pending or rejected requester can read but not post.

        Threading is one level deep — replying to a reply re-parents onto the same
        root rather than nesting further.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 2000
                  example: I'm in. Bringing two more.
                parent_comment_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Reply target. Must belong to this same match.
      responses:
        '201':
          description: Posted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Comment'
        '400':
          description: Empty (`COMMENT_EMPTY`) or over 2000 chars (`COMMENT_TOO_LONG`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: You are not a player in this match (`CANNOT_COMMENT`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: CANNOT_COMMENT
                message: Only players in this match can post. Join the match to take part in the discussion
                errors: []
                data: null
        '404':
          description: |
            No such match (`EVENT_NOT_FOUND`) or reply target
            (`COMMENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /events/{event_id}/comments/{comment_id}:
    patch:
      tags: [Event Discussion]
      summary: Edit your comment
      operationId: updateComment
      description: |
        **Author-only** — not even an event admin may edit someone else's words.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: comment_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 2000
                  example: I'm in. Bringing two more — and the ball.
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Comment'
        '400':
          description: Empty (`COMMENT_EMPTY`) or too long (`COMMENT_TOO_LONG`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not the author (`NOT_COMMENT_AUTHOR`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such comment, or it is deleted (`COMMENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
    delete:
      tags: [Event Discussion]
      summary: Delete a comment
      operationId: deleteComment
      description: |
        Author **or** an event admin (moderation). **Soft delete** — the row
        survives so its replies keep a parent, but the content is blanked out of
        every response thereafter.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: comment_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          comment_id:
                            $ref: '#/components/schemas/Uuid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Neither the author nor an event admin (`NOT_COMMENT_AUTHOR`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such comment (`COMMENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/{event_id}/comments/{comment_id}/like:
    post:
      tags: [Event Discussion]
      summary: Toggle a like
      operationId: toggleCommentLike
      description: |
        Idempotent toggle — calling it again removes the like. Liking is a form of
        participation, so it takes the same member gate as posting.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: comment_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Toggled.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [comment_id, liked, likes_count]
                        properties:
                          comment_id:
                            $ref: '#/components/schemas/Uuid'
                          liked:
                            type: boolean
                            description: The caller's state *after* the toggle.
                            example: true
                          likes_count:
                            type: integer
                            example: 4
              example:
                success: true
                message: Liked
                statusCode: 200
                data:
                  comment_id: 0d1e2f3a-4b5c-4d6e-7f8a-9b0c1d2e3f4a
                  liked: true
                  likes_count: 4
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not a player in this match (`CANNOT_COMMENT`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such comment (`COMMENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  # ===========================================================================
  # Event Chat (squad chat)
  # ===========================================================================
  /events/{event_id}/messages:
    get:
      tags: [Event Chat]
      summary: Squad chat history
      operationId: getEventMessages
      description: |
        **Private to the match's members** (approved players + admins). Returns the
        last 50 messages, oldest to newest. Deleted messages are kept as tombstones
        so reply references stay intact.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Chat history.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [messages]
                        properties:
                          messages:
                            type: array
                            items:
                              $ref: '#/components/schemas/Message'
              example:
                success: true
                message: 1 messages
                statusCode: 200
                data:
                  messages:
                    - id: 2f3a4b5c-6d7e-4f8a-9b0c-1d2e3f4a5b6c
                      event_id: 1a2b3c4d-5e6f-4a7b-8c9d-0e1f2a3b4c5d
                      content: On my way, 10 mins late.
                      attachment_url: null
                      message_type: text
                      is_edited: false
                      is_deleted: false
                      created_at: '2026-07-16T17:41:00.000Z'
                      edited_at: null
                      reply_to:
                        id: 3a4b5c6d-7e8f-4a9b-0c1d-2e3f4a5b6c7d
                        sender_name: Rafi Ahmed
                        content: Who's bringing the ball?
                      reactions:
                        - emoji: 🔥
                          count: 2
                          user_ids:
                            - 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                            - 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                      sender:
                        id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                        first_name: Shuvo
                        last_name: Islam
                        profile_picture_url: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not a member of this match (`EVENT_CHAT_FORBIDDEN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: EVENT_CHAT_FORBIDDEN
                message: Only players in this match can use its chat
                errors: []
                data: null
        '404':
          description: No such match (`EVENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Event Chat]
      summary: Send a message
      operationId: sendEventMessage
      description: |
        Member-only. A message must carry text, an attachment, or both. Fans out
        `chat:new` to every member's sockets.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: At least one of `content` or `attachment_url` is required.
              properties:
                content:
                  type: string
                  maxLength: 2000
                  example: On my way, 10 mins late.
                attachment_url:
                  type: string
                  format: uri
                  nullable: true
                  description: HTTPS only, max 1000 chars. Comes from the app's own upload route.
                  example: https://i.ibb.co/abc123/lineup.jpg
                reply_to_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Must point at a message in this same chat.
                message_type:
                  type: string
                  enum: [text, image, location, system]
                  description: Derived when omitted — `image` if an attachment is present, else `text`.
      responses:
        '201':
          description: Sent.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Message'
        '400':
          description: |
            Empty message, over 2000 chars, bad attachment URL, or an invalid
            `message_type` (`VALIDATION_ERROR`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not a member (`EVENT_CHAT_FORBIDDEN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            No such match (`EVENT_NOT_FOUND`) or reply target
            (`MESSAGE_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /events/{event_id}/messages/read:
    post:
      tags: [Event Chat]
      summary: Mark the squad chat read
      operationId: markEventChatRead
      description: |
        Upserts the caller's read marker to now, clearing the chat's unread badge.
        Read state is private per-user, so nothing is fanned out to other members.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Marked read.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          event_id:
                            $ref: '#/components/schemas/Uuid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not a member (`EVENT_CHAT_FORBIDDEN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/{event_id}/messages/{message_id}:
    patch:
      tags: [Event Chat]
      summary: Edit your message
      operationId: editEventMessage
      description: Sender-only, text only. Fans out `chat:update` with the full new DTO.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: message_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 2000
                  example: On my way — 15 mins, sorry.
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Message'
        '400':
          description: Empty or too long (`VALIDATION_ERROR`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not your message (`NOT_MESSAGE_OWNER`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            No such message in this chat, or it is deleted (`MESSAGE_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
    delete:
      tags: [Event Chat]
      summary: Delete a message
      operationId: deleteEventMessage
      description: |
        Sender **or** a match admin. Soft delete — the message keeps its id and
        position but hides its content, attachment and reactions. Fans out
        `chat:delete`.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: message_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            $ref: '#/components/schemas/Uuid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            Neither the sender nor a match admin (`MESSAGE_DELETE_FORBIDDEN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such message in this chat (`MESSAGE_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/{event_id}/messages/{message_id}/reactions:
    post:
      tags: [Event Chat]
      summary: Toggle an emoji reaction
      operationId: reactEventMessage
      description: |
        Member-only toggle — reacting with the same emoji again removes it. Fans
        out `chat:reaction` with the message's fresh grouped reactions.
      parameters:
        - name: event_id
          in: path
          required: true

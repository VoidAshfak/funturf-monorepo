          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji:
                  type: string
                  maxLength: 16
                  example: 🔥
      responses:
        '200':
          description: Reaction toggled.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [message_id, reactions]
                        properties:
                          message_id:
                            $ref: '#/components/schemas/Uuid'
                          reactions:
                            type: array
                            items:
                              $ref: '#/components/schemas/MessageReaction'
              example:
                success: true

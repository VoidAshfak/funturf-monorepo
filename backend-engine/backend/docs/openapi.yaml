          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  /bookings/verify-lookup:
    get:
      tags: [Bookings]
      summary: Resolve a printed ticket reference
      operationId: lookupBookingByRef
      description: |
        **Roles:** `turf_admin` (own turfs only), `super_admin` (all).

        Manual fallback for when a ticket QR won't scan. The reference is the
        short code printed on the ticket — the first 8 hex characters of the
        booking id. `FT-7K3QX9A1`, `7k3qx9a1` and `7K3QX9A1` all normalize the same.

        8 hex is 32 bits, so a collision within one turf is astronomically
        unlikely — but if two ever match, the API refuses rather than guesses
        (`BOOKING_REF_AMBIGUOUS`): scan the QR instead.
      parameters:
        - name: code
          in: query
          required: true
          description: The ticket reference. Must normalize to exactly 8 hex characters.
          schema:
            type: string
          example: FT-7K3QX9A1
      responses:
        '200':
          description: Booking resolved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BookingWithRelations'
        '400':
          description: Not a valid reference (`VALIDATION_ERROR`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: VALIDATION_ERROR
                message: Enter a valid ticket reference (e.g. FT-7K3QX9A1)
                errors: []
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: No booking on your turfs matches (`BOOKING_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The reference matches more than one booking (`BOOKING_REF_AMBIGUOUS`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /bookings/{booking_id}:
    get:
      tags: [Bookings]
      summary: Get a booking
      operationId: getBookingById
      description: |
        Visible to the **owner** or the admin of the booking's own turf — never an
        unrelated `turf_admin` (the row carries a payment proof). When a match is
        attached, its trust snapshot is embedded.
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Booking found.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BookingWithRelations'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not your booking and not your turf (`NOT_BOOKING_OWNER`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such booking (`BOOKING_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /bookings/{booking_id}/confirm-payment:
    post:
      tags: [Bookings]
      summary: Verify a payment
      operationId: confirmPayment
      description: |
        **Roles:** the admin of *this* booking's turf, or `super_admin`.

        Marks the booking `confirmed` / `completed`. The booking must be a paid
        claim awaiting verification (`payment_status: partial`).

        From here **payment is final** — the booking can afterwards only be
        cancelled by mutual acceptance.
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                admin_notes:
                  type: string
                  nullable: true
                  description: Kept as-is when omitted.
                  example: Verified against bKash statement.
      responses:
        '200':
          description: Payment confirmed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not the admin of this booking's turf (`NOT_TURF_ADMIN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such booking (`BOOKING_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            Already cancelled (`BOOKING_ALREADY_CANCELLED`), or there's no payment
            awaiting verification (`BOOKING_NOT_PAID_CLAIM`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /bookings/{booking_id}/reject-payment:
    post:
      tags: [Bookings]
      summary: Reject a payment claim
      operationId: rejectPayment
      description: |
        **Roles:** the admin of *this* booking's turf, or `super_admin`.

        Reverts a paid claim to an **unpaid hold**: clears the transaction id and
        proof, unlocks the slot, and downgrades the claim so it now expires like
        any other hold (2h TTL) — a rejected payment can't park a slot
        indefinitely. The user keeps a soft hold but must re-pay to secure it.
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                admin_notes:
                  type: string
                  nullable: true
                  example: Transaction id not found in our statement.
      responses:
        '200':
          description: Payment rejected; booking reverted to an unpaid hold.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not the admin of this booking's turf (`NOT_TURF_ADMIN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such booking (`BOOKING_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            Already cancelled (`BOOKING_ALREADY_CANCELLED`) or nothing to reject
            (`BOOKING_NOT_PAID_CLAIM`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /bookings/{booking_id}/cancel:
    post:
      tags: [Bookings]
      summary: Cancel a booking
      operationId: cancelBooking
      description: |
        Callable by the **booker** or the admin of the booking's turf. What happens
        depends on how far the booking got:

        | State | Outcome |
        |---|---|
        | Unpaid hold | Cancelled immediately, any time, free — it never locked a slot. |
        | Paid, not yet confirmed | Free cancel only if the match is **≥ 2 days** away, else `CANCELLATION_WINDOW_CLOSED`. Flags a refund. |
        | Paid **and** admin-confirmed | Payment is final — this opens a **mutual cancellation request**; the other party must accept via `/cancel/respond`. |

        Cancelling frees the slot boolean back on and drops the claim. The
        counterparty is notified in every case.
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  nullable: true
                  example: Team can't make it — half the squad is away.
      responses:
        '200':
          description: |
            Cancelled, **or** a mutual cancellation was opened — read `message` to
            tell which.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          booking_id:
                            $ref: '#/components/schemas/Uuid'
              examples:
                cancelled:
                  summary: Cancelled outright
                  value:
                    success: true
                    message: Booking cancelled
                    statusCode: 200
                    data:
                      booking_id: 8c2d1f0a-3b4e-4a5c-9d6e-7f8a9b0c1d2e
                mutualRequested:
                  summary: Confirmed booking — handshake opened
                  value:
                    success: true
                    message: Cancellation requested — awaiting the other party's acceptance
                    statusCode: 200
                    data:
                      booking_id: 8c2d1f0a-3b4e-4a5c-9d6e-7f8a9b0c1d2e
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Neither the booker nor this turf's admin (`NOT_BOOKING_OWNER`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such booking (`BOOKING_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            Already cancelled (`BOOKING_ALREADY_CANCELLED`), or the free-cancel
            window has closed (`CANCELLATION_WINDOW_CLOSED`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: CANCELLATION_WINDOW_CLOSED
                message: Free cancellation is only allowed until 2 days before the booking
                errors: []
                data: null
        '429':
          $ref: '#/components/responses/RateLimited'

  /bookings/{booking_id}/cancel/respond:
    post:
      tags: [Bookings]
      summary: Answer a mutual cancellation
      operationId: respondCancellation
      description: |
        For the **counterparty** to whoever opened the request — the person who
        opened it cannot answer their own.

        `accept: true` finalises the cancellation and flags a refund;
        `accept: false` clears the request and the booking stands.
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accept:
                  type: boolean
                  description: '`true` to cancel by mutual acceptance; `false` to decline.'
                  example: true
      responses:
        '200':
          description: Answered.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          booking_id:
                            $ref: '#/components/schemas/Uuid'
              examples:
                accepted:
                  summary: Accepted
                  value:
                    success: true
                    message: Booking cancelled by mutual acceptance
                    statusCode: 200
                    data:
                      booking_id: 8c2d1f0a-3b4e-4a5c-9d6e-7f8a9b0c1d2e
                declined:
                  summary: Declined — booking stands
                  value:
                    success: true
                    message: Cancellation declined
                    statusCode: 200
                    data:
                      booking_id: 8c2d1f0a-3b4e-4a5c-9d6e-7f8a9b0c1d2e
        '400':
          description: You opened this request — the other party must respond (`VALIDATION_ERROR`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Neither the booker nor this turf's admin (`NOT_BOOKING_OWNER`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such booking (`BOOKING_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            Already cancelled (`BOOKING_ALREADY_CANCELLED`), or no mutual
            cancellation is open (`CANCELLATION_NOT_REQUESTED`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /bookings/{booking_id}/check-in:
    post:
      tags: [Bookings]
      summary: Check a ticket in at the gate
      operationId: checkInBooking
      description: |
        **Roles:** the admin of *this* booking's turf, or `super_admin` — a
        competitor can never check in your players.

        The turf admin scans the player's ticket QR (which carries the booking id)
        to confirm attendance. The booking must be `confirmed` — an unpaid hold or
        an unverified claim has no valid ticket (`BOOKING_NOT_CONFIRMED`).

        **Single-use:** a second scan is rejected (`ALREADY_CHECKED_IN`), so a
        screenshot of someone's ticket can't be reused after they've entered.
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Checked in. `check_in_time` is now set.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Booking'
              example:
                success: true
                message: Checked in
                statusCode: 200
                data:
                  id: 8c2d1f0a-3b4e-4a5c-9d6e-7f8a9b0c1d2e
                  ground_id: 2b3c4d5e-6f7a-4b8c-9d0e-1f2a3b4c5d6e
                  user_id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                  booking_date: '2026-07-20T00:00:00.000Z'
                  slot:
                    code: t1800
                    start_time: '18:00'
                    end_time: '19:30'
                  booking_status: confirmed
                  payment_status: completed
                  check_in_time: '2026-07-20T17:52:00.000Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not the admin of this booking's turf (`NOT_TURF_ADMIN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such booking (`BOOKING_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            The booking isn't confirmed (`BOOKING_NOT_CONFIRMED`), or the ticket
            was already used (`ALREADY_CHECKED_IN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: ALREADY_CHECKED_IN
                message: This ticket has already been checked in
                errors: []
                data: null
        '429':
          $ref: '#/components/responses/RateLimited'

  # ===========================================================================
  # Promotions (turf manager)
  # ===========================================================================
  /promotions:
    get:
      tags: [Promotions]
      summary: List your coupons
      operationId: getPromotions
      description: |
        **Roles:** `turf_admin`, `super_admin`.

        Every promotion on the caller's turf, newest first, each decorated with the
        derived `is_expired` / `is_exhausted` / `effective_status`.
      parameters:
        - name: turf_id
          in: query
          required: false
          description: '`super_admin` only — target a specific turf. Ignored for `turf_admin`.'
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Your promotions.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [promotions]
                        properties:
                          promotions:
                            type: array
                            items:
                              $ref: '#/components/schemas/Promotion'
              example:
                success: true
                message: 1 promotions
                statusCode: 200
                data:
                  promotions:
                    - id: 5d4c3b2a-1e0f-4a9b-8c7d-6e5f4a3b2c1d
                      turf_id: 4d5e6f7a-8b9c-4d0e-1f2a-3b4c5d6e7f8a
                      ground_id: null
                      code: EID10
                      title: Eid weekend 10% off
                      description: Valid on all evening slots during Eid week.
                      discount_type: percentage
                      discount_value: 10
                      minimum_booking_amount: 2000
                      maximum_discount_amount: 500
                      valid_from: '2026-07-01T00:00:00.000Z'
                      valid_until: '2026-07-31T23:59:59.000Z'
                      usage_limit: 100
                      used_count: 23
                      applicable_users: null
                      applicable_days: [4, 5]
                      status: active
                      ground_rate: null
                      is_expired: false
                      is_exhausted: false
                      effective_status: active
                      created_at: '2026-06-20T09:00:00.000Z'
                      updated_at: '2026-07-02T14:10:00.000Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: You don't own a turf yet (`NO_TURF_FOR_ADMIN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Promotions]
      summary: Create a coupon
      operationId: createPromotion
      description: |
        **Roles:** `turf_admin`, `super_admin`.

        The promotion always belongs to the caller's turf. Scope narrows through
        any combination of ground, users and weekdays; redemption is applied at
        booking time.

        `code` is uppercased and must be unique **within this turf** — the same
        code may exist on another turf.
      parameters:
        - name: turf_id
          in: query
          required: false
          description: '`super_admin` only. Also accepted in the body.'
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, title, discount_type, discount_value, valid_from, valid_until]
              properties:
                code:
                  type: string
                  maxLength: 50
                  description: Uppercased server-side. Unique per turf.
                  example: EID10
                title:
                  type: string
                  example: Eid weekend 10% off
                description:
                  type: string
                  nullable: true
                  example: Valid on all evening slots during Eid week.
                discount_type:
                  type: string
                  enum: [percentage, fixed_amount]
                  example: percentage
                discount_value:
                  type: number
                  format: double
                  description: Must be > 0; must be ≤ 100 when `percentage`.
                  example: 10
                valid_from:
                  type: string
                  format: date-time
                  example: '2026-07-01T00:00:00.000Z'
                valid_until:
                  type: string
                  format: date-time
                  description: Must be after `valid_from`.
                  example: '2026-07-31T23:59:59.000Z'
                minimum_booking_amount:
                  type: number
                  nullable: true
                  description: Must be ≥ 0.
                  example: 2000
                maximum_discount_amount:
                  type: number
                  nullable: true
                  description: Must be ≥ 0.
                  example: 500
                usage_limit:
                  type: integer
                  nullable: true
                  minimum: 1
                  description: Global cap. `null` for unlimited.
                  example: 100
                ground_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Must belong to your turf (`PROMO_SCOPE_FORBIDDEN` otherwise).
                applicable_users:
                  type: array
                  nullable: true
                  description: Makes the coupon private to these users. `null`/`[]` clears the targeting.
                  items:
                    $ref: '#/components/schemas/Uuid'
                applicable_days:
                  type: array
                  nullable: true
                  description: Weekdays 0–6 (0 = Sunday).
                  items:
                    type: integer
                    minimum: 0
                    maximum: 6
                  example: [4, 5]
                status:
                  type: string
                  enum: [active, inactive, expired]
                  example: active
                turf_id:
                  allOf:
                    - $ref: '#/components/schemas/Uuid'
                  description: '`super_admin` only.'
            example:
              code: EID10
              title: Eid weekend 10% off
              description: Valid on all evening slots during Eid week.
              discount_type: percentage
              discount_value: 10
              minimum_booking_amount: 2000
              maximum_discount_amount: 500
              valid_from: '2026-07-01T00:00:00.000Z'
              valid_until: '2026-07-31T23:59:59.000Z'
              usage_limit: 100
              applicable_days: [4, 5]
              status: active
      responses:
        '201':
          description: Promotion created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Promotion'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            Wrong role (`FORBIDDEN`), or the ground isn't yours
            (`PROMO_SCOPE_FORBIDDEN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: You don't own a turf yet (`NO_TURF_FOR_ADMIN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: That code already exists on this turf (`PROMO_CODE_EXISTS`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: PROMO_CODE_EXISTS
                message: A promotion with this code already exists
                errors: []
                data: null

  /promotions/analytics:
    get:
      tags: [Promotions]
      summary: Coupon analytics
      operationId: getPromotionAnalytics
      description: |
        **Roles:** `turf_admin`, `super_admin`.

        Headline totals, per-coupon breakdown (top 10), a zero-filled daily series
        and an effective-status count — the dashboard charts.
      parameters:
        - name: days
          in: query
          required: false
          description: Window for the time series. Clamped to 7..180.
          schema:
            type: integer
            minimum: 7
            maximum: 180
            default: 30
          example: 30
        - name: turf_id
          in: query
          required: false
          description: '`super_admin` only.'
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Analytics.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [range_days, totals, status_counts, by_coupon, timeseries]
                        properties:
                          range_days:
                            type: integer
                            description: The window actually used, after clamping.
                            example: 30
                          totals:
                            type: object
                            properties:
                              redemptions:
                                type: integer
                                example: 64
                              total_discount:
                                type: number
                                format: double
                                example: 18400
                              unique_users:
                                type: integer
                                example: 41
                          status_counts:
                            type: object
                            description: Promotions by effective status.
                            properties:
                              active:
                                type: integer
                                example: 3
                              inactive:
                                type: integer
                                example: 1
                              expired:
                                type: integer
                                example: 5
                              exhausted:
                                type: integer
                                example: 1
                              total:
                                type: integer
                                example: 10
                          by_coupon:
                            type: array
                            description: Top 10 by redemptions.
                            items:
                              type: object
                              properties:
                                code:
                                  type: string
                                  example: EID10
                                title:
                                  type: string
                                  example: Eid weekend 10% off
                                redemptions:
                                  type: integer
                                  example: 23
                                total_discount:
                                  type: number
                                  format: double
                                  example: 6900
                          timeseries:
                            type: array
                            description: One bucket per day in the window, zero-filled.
                            items:
                              type: object
                              properties:
                                day:
                                  type: string
                                  format: date
                                  example: '2026-07-16'
                                redemptions:
                                  type: integer
                                  example: 2
                                discount:
                                  type: number
                                  format: double
                                  example: 640
              example:
                success: true
                message: Promotion analytics
                statusCode: 200
                data:
                  range_days: 30
                  totals:
                    redemptions: 64
                    total_discount: 18400
                    unique_users: 41
                  status_counts:
                    active: 3
                    inactive: 1
                    expired: 5
                    exhausted: 1
                    total: 10
                  by_coupon:
                    - code: EID10
                      title: Eid weekend 10% off
                      redemptions: 23
                      total_discount: 6900
                  timeseries:
                    - day: '2026-07-15'
                      redemptions: 3
                      discount: 900
                    - day: '2026-07-16'
                      redemptions: 2
                      discount: 640
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: You don't own a turf yet (`NO_TURF_FOR_ADMIN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /promotions/{promotion_id}:
    get:
      tags: [Promotions]
      summary: Get a coupon
      operationId: getPromotionById
      description: |
        **Roles:** `turf_admin`, `super_admin`. A promotion on another turf reads
        as `PROMO_NOT_FOUND` — existence is not leaked.
      parameters:
        - name: promotion_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Promotion found.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Promotion'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not found, or not on your turf (`PROMO_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Promotions]
      summary: Update a coupon
      operationId: updatePromotion
      description: |
        **Roles:** `turf_admin`, `super_admin`. Partial update — only the fields
        present are validated and written. A changed `code` must stay unique within
        the turf.
      parameters:
        - name: promotion_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: All fields optional — send only what changes.
              properties:
                code:
                  type: string
                  maxLength: 50
                  example: EID15
                title:
                  type: string
                  example: Eid weekend 15% off
                description:
                  type: string
                  nullable: true
                discount_type:
                  type: string
                  enum: [percentage, fixed_amount]
                discount_value:
                  type: number
                  example: 15
                valid_from:
                  type: string
                  format: date-time
                valid_until:
                  type: string
                  format: date-time
                minimum_booking_amount:
                  type: number
                  nullable: true
                maximum_discount_amount:
                  type: number
                  nullable: true
                usage_limit:
                  type: integer
                  nullable: true
                ground_id:
                  type: string
                  format: uuid
                  nullable: true
                applicable_users:
                  type: array
                  nullable: true
                  items:
                    $ref: '#/components/schemas/Uuid'
                applicable_days:
                  type: array
                  nullable: true
                  items:
                    type: integer
                    minimum: 0
                    maximum: 6
                status:
                  type: string
                  enum: [active, inactive, expired]
            example:
              discount_value: 15
              status: inactive
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Promotion'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            Wrong role (`FORBIDDEN`), or the ground isn't yours
            (`PROMO_SCOPE_FORBIDDEN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found, or not on your turf (`PROMO_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The new code already exists on this turf (`PROMO_CODE_EXISTS`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Promotions]
      summary: Delete a coupon
      operationId: deletePromotion
      description: |
        **Roles:** `turf_admin`, `super_admin`.

        If the coupon has **ever been redeemed** it is deactivated
        (`status: inactive`) instead of deleted, so the usage/analytics history
        stays intact. Both outcomes return 200 — read `message` and the returned
        `status` to tell which happened.
      parameters:
        - name: promotion_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Deleted, or deactivated if it had redemptions.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        description: |
                          The deactivated `Promotion`, or `{ id }` when hard-deleted.
                        oneOf:
                          - $ref: '#/components/schemas/Promotion'
                          - type: object
                            properties:
                              id:
                                $ref: '#/components/schemas/Uuid'
              examples:
                deleted:
                  summary: Never redeemed — hard-deleted
                  value:
                    success: true
                    message: Promotion deleted
                    statusCode: 200
                    data:
                      id: 5d4c3b2a-1e0f-4a9b-8c7d-6e5f4a3b2c1d
                deactivated:
                  summary: Had redemptions — deactivated
                  value:
                    success: true
                    message: Promotion had redemptions — deactivated instead of deleted
                    statusCode: 200
                    data:
                      id: 5d4c3b2a-1e0f-4a9b-8c7d-6e5f4a3b2c1d
                      code: EID10
                      status: inactive
                      effective_status: inactive
                      is_expired: false
                      is_exhausted: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not found, or not on your turf (`PROMO_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===========================================================================
  # Coupons (customer-facing)
  # ===========================================================================
  /coupons/available:
    get:
      tags: [Coupons]
      summary: Coupons you can use
      operationId: getAvailableCoupons
      description: |
        The coupons the **signed-in caller** may apply to a booking on this ground
        (and date, if given). Auth-only but *not* admin-gated.

        Every scope is filtered server-side — validity window, ground/turf/global
        scope, usage cap, weekday and user targeting — so private and group coupons
        never leak to anyone they weren't meant for.

        Validity and weekday are judged against the **booking date** when supplied
        (you book in advance), else today.
      parameters:
        - name: ground_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: date
          in: query
          required: false
          description: The booking date. Defaults to today.
          schema:
            type: string
            format: date
          example: '2026-07-24'
      responses:
        '200':
          description: Usable coupons, best discount first.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [coupons]
                        properties:
                          coupons:
                            type: array
                            items:
                              $ref: '#/components/schemas/AvailableCoupon'
              example:
                success: true
                message: 1 coupons
                statusCode: 200
                data:
                  coupons:
                    - code: EID10
                      title: Eid weekend 10% off
                      description: Valid on all evening slots during Eid week.
                      discount_type: percentage
                      discount_value: 10
                      minimum_booking_amount: 2000
                      maximum_discount_amount: 500
                      is_targeted: false
        '400':
          description: '`ground_id` missing (`VALIDATION_ERROR`).'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No such ground (`GROUND_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===========================================================================
  # Notifications
  # ===========================================================================
  /notifications:
    get:
      tags: [Notifications]
      summary: Your notifications
      operationId: getNotifications
      description: |
        Paginated, newest first, always scoped to the caller — every query is
        filtered by user id, so there is no way to read someone else's.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 15
      responses:
        '200':
          description: Your notifications.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [notifications, unreadCount, pagination]
                        properties:
                          notifications:
                            type: array
                            items:
                              $ref: '#/components/schemas/Notification'
                          unreadCount:
                            type: integer
                            description: Total unread across all pages.
                            example: 2
                          pagination:
                            $ref: '#/components/schemas/Pagination'
              example:
                success: true
                message: 1 notifications found
                statusCode: 200
                data:
                  notifications:
                    - id: 4b5c6d7e-8f9a-4b0c-1d2e-3f4a5b6c7d8e
                      user_id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                      type: payment_received
                      title: Payment confirmed
                      message: Your booking for Gulshan Sports Arena is confirmed
                      data:
                        bookingId: 8c2d1f0a-3b4e-4a5c-9d6e-7f8a9b0c1d2e
                      priority: high
                      action_url: /bookings
                      is_read: false
                      read_at: null
                      created_at: '2026-07-16T18:30:00.000Z'
                  unreadCount: 2
                  pagination:
                    page: 1
                    limit: 15
                    total: 1
                    hasMore: false
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Unread count
      operationId: getUnreadCount
      description: Cheap poll for the bell badge.
      responses:
        '200':
          description: The count.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [unreadCount]
                        properties:
                          unreadCount:
                            type: integer
                            example: 2
              example:
                success: true
                message: Unread count
                statusCode: 200
                data:
                  unreadCount: 2
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all read
      operationId: markAllAsRead
      description: Marks every unread notification of the caller's as read.
      responses:
        '200':
          description: Marked read.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [updated]
                        properties:
                          updated:
                            type: integer
                            description: How many rows changed.
                            example: 2
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark one read
      operationId: markNotificationAsRead
      description: Idempotent. Someone else's notification reads as `NOTIFICATION_NOT_FOUND`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Marked read.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not yours, or no such row (`NOTIFICATION_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/{id}:
    delete:
      tags: [Notifications]
      summary: Delete a notification
      operationId: deleteNotification
      description: Removes one of the caller's own notifications.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            $ref: '#/components/schemas/Uuid'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not yours, or no such row (`NOTIFICATION_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===========================================================================
  # Chat (DMs)
  # ===========================================================================
  /chat/conversations:
    get:
      tags: [Chat]
      summary: Unified conversation list
      operationId: getConversations
      description: |
        One merged, activity-sorted list of the caller's DM threads **and** the
        match chats they're a member of. Powers the navbar chat box.

        Match chats with no messages yet still appear (so a member can start one)
        and sort by the event's creation time.
      responses:
        '200':
          description: Conversations, most recent first.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [conversations, total_unread]
                        properties:
                          conversations:
                            type: array
                            items:
                              $ref: '#/components/schemas/Conversation'
                          total_unread:
                            type: integer
                            description: Sum of every conversation's unread count.
                            example: 3
              example:
                success: true
                message: 2 conversations
                statusCode: 200
                data:
                  conversations:
                    - type: dm
                      id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                      title: Shuvo Islam
                      avatar: null
                      unread: 2
                      last_message:
                        content: On my way, 10 mins late.
                        created_at: '2026-07-16T17:41:00.000Z'
                        from_me: false
                      activity: 1784223660000
                    - type: match
                      id: 1a2b3c4d-5e6f-4a7b-8c9d-0e1f2a3b4c5d
                      title: Friday Night 7s
                      sport_type: football
                      avatar: null
                      unread: 1
                      last_message:
                        content: Photo
                        created_at: '2026-07-16T16:02:00.000Z'
                        from_me: false
                      activity: 1784217720000
                  total_unread: 3
        '401':
          $ref: '#/components/responses/Unauthorized'

  /chat/dm/{user_id}:
    get:
      tags: [Chat]
      summary: Read a DM thread
      operationId: getDmThread
      description: |
        The last 50 messages with another user (oldest to newest), plus that user's
        profile for the header. You cannot open a thread with yourself.
      parameters:
        - name: user_id
          in: path
          required: true
          description: The other participant.
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: The thread.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [user, messages]
                        properties:
                          user:
                            allOf:
                              - $ref: '#/components/schemas/UserSummary'
                            description: The other participant, for the header.
                          messages:
                            type: array
                            items:
                              $ref: '#/components/schemas/Message'
              example:
                success: true
                message: 1 messages
                statusCode: 200
                data:
                  user:
                    id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                    first_name: Shuvo
                    last_name: Islam
                    profile_picture_url: null
                  messages:
                    - id: 6d7e8f9a-0b1c-4d2e-3f4a-5b6c7d8e9f0a
                      recipient_id: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e
                      content: On my way, 10 mins late.
                      attachment_url: null
                      message_type: text
                      is_edited: false
                      is_deleted: false
                      created_at: '2026-07-16T17:41:00.000Z'
                      reply_to: null
                      reactions: []
                      sender:
                        id: 7d6c5b4a-3f2e-4d1c-8b0a-9e8d7c6b5a4f
                        first_name: Shuvo
                        last_name: Islam
                        profile_picture_url: null
        '400':
          description: You cannot open a thread with yourself (`SELF_MESSAGE_FORBIDDEN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No such user (`USER_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Chat]
      summary: Send a DM
      operationId: sendDm
      description: |
        Text and/or image. Self-messaging is blocked. Pushes `dm:new` to both
        participants' user rooms, so the sender's other devices stay in sync too.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: At least one of `content` or `attachment_url` is required.
              properties:
                content:
                  type: string
                  maxLength: 2000
                  example: See you at 6.
                attachment_url:
                  type: string
                  format: uri
                  nullable: true
                  description: HTTPS only, max 1000 chars.
                  example: null
                reply_to_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Must point at a message in **this same thread**.
      responses:
        '201':
          description: Sent.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Message'
        '400':
          description: |
            Empty, too long, a bad attachment URL (`VALIDATION_ERROR`), or messaging
            yourself (`SELF_MESSAGE_FORBIDDEN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: |
            No such user (`USER_NOT_FOUND`), or the reply target isn't in this
            thread (`MESSAGE_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /chat/dm/{user_id}/read:
    post:
      tags: [Chat]
      summary: Mark a DM thread read
      operationId: markDmRead
      description: |
        Marks every message from that user to the caller as read, clearing the
        thread's unread badge. Notifies the caller's other devices via `dm:read`.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Marked read.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [user_id, count]
                        properties:
                          user_id:
                            allOf:
                              - $ref: '#/components/schemas/Uuid'
                            description: The other participant.
                          count:
                            type: integer
                            description: How many messages were marked.
                            example: 2
        '400':
          description: Self-thread (`SELF_MESSAGE_FORBIDDEN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /chat/dm/{user_id}/messages/{message_id}/reactions:
    post:
      tags: [Chat]
      summary: Toggle a DM reaction
      operationId: reactDm
      description: |
        Toggle an emoji on a DM. Only a participant of the thread may react — the
        message must belong to *this* thread, so you can't react to strangers'
        messages by id. Pushes `dm:reaction` to both parties.
      parameters:
        - name: user_id
          in: path
          required: true
          description: The other participant in the thread.
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: message_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji:
                  type: string
                  maxLength: 16
                  example: 👍
      responses:
        '200':
          description: Reaction toggled.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [message_id, reactions]
                        properties:
                          message_id:
                            $ref: '#/components/schemas/Uuid'
                          reactions:
                            type: array
                            items:
                              $ref: '#/components/schemas/MessageReaction'
        '400':
          description: |
            Missing/oversized emoji (`VALIDATION_ERROR`) or a self-thread
            (`SELF_MESSAGE_FORBIDDEN`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: |
            The message doesn't exist, is deleted, or isn't in this thread
            (`MESSAGE_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  # ===========================================================================
  # System
  # ===========================================================================
  /health:
    get:
      tags: [System]
      summary: Health probe
      operationId: health
      security: []
      servers:
        - url: http://localhost:8080
          description: Local development
        - url: https://app4-osju.onrender.com
          description: Production
      description: |
        Liveness probe used by Docker/Render and the nginx upstream check.

        **Note the path:** this lives at the server root (`/health`), *not* under
        `/api/v1` — hence the server override above. Returns plain text, not JSON.
      responses:
        '200':
          description: The service is up.
          content:
            text/plain:
              schema:
                type: string
                example: OK

components:

  # ---------------------------------------------------------------------------
  # Security
  # ---------------------------------------------------------------------------
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Access token from `/users/login`, `/users/register` or `/users/refresh`,
        sent as `Authorization: Bearer <token>`. Verified with
        `ACCESS_TOKEN_SECRET`; payload is `{ id, email, user_type }`.

  # ---------------------------------------------------------------------------
  # Reusable parameters
  # ---------------------------------------------------------------------------
  parameters:
    PageParam:
      name: page
      in: query
      required: false
      description: 1-based page number.
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1
    LimitParam:
      name: limit
      in: query
      required: false
      description: Page size. Clamped server-side.
      schema:
        type: integer
        minimum: 1
        default: 20
      example: 20

  # ---------------------------------------------------------------------------
  # Reusable responses
  # ---------------------------------------------------------------------------
  responses:
    Unauthorized:
      description: |
        Missing or invalid access token (`MISSING_TOKEN`, `INVALID_TOKEN`).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: MISSING_TOKEN
            message: Authentication token is missing
            errors: []
            data: null
    Forbidden:
      description: |
        Authenticated, but not allowed — wrong role (`FORBIDDEN`) or acting
        outside your own turf/resource (`NOT_TURF_ADMIN`, `PROMO_SCOPE_FORBIDDEN`).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: FORBIDDEN
            message: You do not have permission to perform this action
            errors: []
            data: null
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: NOT_FOUND
            message: Resource not found
            errors: []
            data: null
    ValidationError:
      description: One or more fields are missing or invalid (`VALIDATION_ERROR`).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: VALIDATION_ERROR
            message: first_name, last_name, email and password are required
            errors: []
            data: null
    Conflict:
      description: The request conflicts with current state (`CONFLICT` family).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: CONFLICT
            message: Resource already exists
            errors: []
            data: null
    RateLimited:
      description: Rate limit exceeded (`RATE_LIMITED`).
      headers:
        RateLimit-Limit:
          schema:
            type: integer
          description: Requests permitted in the current window.
        RateLimit-Remaining:
          schema:
            type: integer
          description: Requests left in the current window.
        RateLimit-Reset:
          schema:
            type: integer
          description: Seconds until the window resets.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: RATE_LIMITED
            message: Too many requests — slow down and try again shortly
            errors: []
            data: null
    InternalError:
      description: Unhandled server error (`INTERNAL_ERROR`).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: INTERNAL_ERROR
            message: Internal server error
            errors: []
            data: null

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:

    # ---- envelopes ----------------------------------------------------------
    ApiResponse:
      type: object
      description: |
        The success envelope produced by `ApiResponse`. `data` is endpoint-specific
        and is narrowed by each operation below.
      required: [success, message, statusCode]
      properties:
        success:
          type: boolean
          description: Always `true` for a 2xx response (`statusCode < 400`).
          example: true
        message:
          type: string
          description: Human-readable summary. Do not branch on this — use HTTP status / error `code`.
          example: Success
        statusCode:
          type: integer
          description: Mirrors the HTTP status.
          example: 200
        data:
          description: |
            Endpoint-specific payload, narrowed by each operation below. May be
            `null`, or absent entirely on a few legacy handlers.

    ErrorResponse:
      type: object
      description: |
        The failure envelope produced by `errorHandler`. Note it has **no**
        `statusCode` field — the HTTP status carries that.
      required: [success, code, message, errors]
      properties:
        success:
          type: boolean
          description: Always `false`.
          example: false
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
          description: Human-readable message. May be overridden per call site.
          example: This slot is already booked
        errors:
          type: array
          description: Optional field-level detail. Empty unless a handler supplied it.
          items: {}
          example: []
        data:
          description: Extra context an `ApiError` chose to attach. Usually `null`.
          example: null

    ErrorCode:
      type: string
      description: |
        Stable, machine-readable error identifier from `src/utils/errorCodes.js`.
        Never renamed once shipped — safe to branch on. Legacy `ApiError(status,
        message)` calls without an explicit code fall back to a status-derived
        code (`BAD_REQUEST`, `UNAUTHORIZED`, `FORBIDDEN`, `NOT_FOUND`, `CONFLICT`,
        `INTERNAL_ERROR`).
      enum:
        # generic
        - INTERNAL_ERROR
        - VALIDATION_ERROR
        - BAD_REQUEST
        - NOT_FOUND
        - UNAUTHORIZED
        - FORBIDDEN
        - CONFLICT
        # auth / users
        - MISSING_TOKEN
        - INVALID_TOKEN
        - TOKEN_EXPIRED
        - INVALID_CREDENTIALS
        - USER_NOT_FOUND
        - USER_ALREADY_EXISTS
        - TOKEN_GENERATION_FAILED
        # events
        - EVENT_NOT_FOUND
        - NOT_EVENT_ORGANIZER
        - EVENT_FULL
        - ALREADY_JOINED
        - NOT_EVENT_PARTICIPANT
        - NOT_EVENT_ADMIN
        - JOIN_REQUEST_NOT_FOUND
        - INVITATION_NOT_FOUND
        - SELF_MESSAGE_FORBIDDEN
        - NO_TURF_FOR_ADMIN
        - PROMO_NOT_FOUND
        - PROMO_CODE_EXISTS
        - PROMO_SCOPE_FORBIDDEN
        - BOOKING_ALREADY_ATTACHED
        - EVENT_CHAT_FORBIDDEN
        - MESSAGE_NOT_FOUND
        - NOT_MESSAGE_OWNER
        - MESSAGE_DELETE_FORBIDDEN
        - ALREADY_ADMIN
        - EVENT_NOT_EDITABLE
        - INVALID_PLAYER_LIMITS
        - EVENT_SCHEDULE_LOCKED
        # event comments
        - COMMENT_NOT_FOUND
        - NOT_COMMENT_AUTHOR
        - CANNOT_COMMENT
        - COMMENT_EMPTY
        - COMMENT_TOO_LONG
        - REPLY_DEPTH_EXCEEDED
        # bookings / slots
        - GROUND_NOT_FOUND
        - SLOT_NOT_FOUND
        - SLOT_UNAVAILABLE
        - SLOT_HELD_UNPAID
        - TURF_NOT_VERIFIED
        - GROUND_NOT_AVAILABLE
        - TURF_ALREADY_EXISTS
        - INVALID_SLOT_CODE
        - BOOKING_NOT_FOUND
        - NOT_BOOKING_OWNER
        - NOT_TURF_ADMIN
        - PAYMENT_PROOF_REQUIRED
        - BOOKING_NOT_PAID_CLAIM
        - BOOKING_ALREADY_CANCELLED
        - BOOKING_NOT_CONFIRMED
        - ALREADY_CHECKED_IN
        - BOOKING_REF_AMBIGUOUS
        - CANCELLATION_WINDOW_CLOSED
        - CANCELLATION_NOT_REQUESTED
        - TOO_MANY_UNPAID_HOLDS
        - BOOKING_DATE_IN_PAST
        - BOOKING_TOO_FAR_AHEAD
        - DUPLICATE_TRANSACTION
        - INVALID_PAYMENT_PROOF
        - ALREADY_BOOKED_SLOT
        - RATE_LIMITED
        # turfmates / connections
        - CANNOT_CONNECT_SELF
        - CONNECTION_ALREADY_EXISTS
        - CONNECTION_NOT_FOUND
        # teams
        - TEAM_NOT_FOUND
        - NOT_TEAM_CAPTAIN
        - NOT_TEAM_MEMBER
        - ALREADY_TEAM_MEMBER
        - TEAM_INVITE_ALREADY_EXISTS
        - TEAM_INVITE_NOT_FOUND
        - CANNOT_REMOVE_CAPTAIN
        - CANNOT_INVITE_SELF
        # notifications
        - NOTIFICATION_NOT_FOUND
      example: SLOT_UNAVAILABLE

    Pagination:
      type: object
      description: Offset pagination block returned alongside paged lists.
      required: [page, limit, total, hasMore]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          description: Total matching rows across all pages.
          example: 47
        hasMore:
          type: boolean
          description: Whether another page exists after this one.
          example: true

    # ---- primitives ---------------------------------------------------------
    Uuid:
      type: string
      format: uuid
      example: 3f1c2b7e-5a44-4d0e-9c8b-1e2a3b4c5d6e

    SlotCode:
      type: string
      description: |
        A 90-minute slot on the discrete grid (`src/utils/bookingService.js`).
        16 slots per day, `t<HHMM>` at the slot's start time.
      enum:
        - t0000
        - t0130
        - t0300
        - t0430
        - t0600
        - t0730
        - t0900
        - t1030
        - t1200
        - t1330
        - t1500
        - t1630
        - t1800
        - t1930
        - t2100
        - t2230
      example: t1800

    UserType:
      type: string
      description: Account role. `super_admin` is never self-assignable at signup.
      enum: [player, turf_admin, super_admin]
      example: player

    BookingStatus:
      type: string
      description: |
        Lifecycle of a booking. `pending` covers both an unpaid soft hold and a
        paid claim awaiting admin verification — read `payment_status` to tell
        them apart.
      enum: [pending, confirmed, cancelled, completed, no_show]
      example: pending

    PaymentStatus:
      type: string
      description: |
        `pending` = no money claimed (soft hold, does not lock the slot).
        `partial` = payment claimed, awaiting admin verification (locks the slot).
        `completed` = admin-verified (realized revenue). `refunded` = cancelled after payment.
      enum: [pending, partial, completed, refunded, failed]
      example: pending

    ParticipantStatus:
      type: string
      description: |
        `requested` = the user asked to join (admin decides). `invited` = an
        organizer pulled them in (the invitee decides). `approved` = on the squad,
        occupies a slot and counts toward `current_players`.
      enum: [requested, invited, approved, rejected]
      example: approved

    ConnectionStatus:
      type: string
      enum: [pending, accepted, rejected, blocked]
      example: accepted

    Connection:
      type: object
      description: |
        A turfmate connection row. Direction is fixed at creation
        (`requester_id -> recipient_id`) and is what decides who may accept.
      required: [id, requester_id, recipient_id, status]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        requester_id:
          allOf:
            - $ref: '#/components/schemas/Uuid'
          description: Who sent the request.
        recipient_id:
          allOf:
            - $ref: '#/components/schemas/Uuid'
          description: Who must accept or decline it.
        status:
          $ref: '#/components/schemas/ConnectionStatus'
        connection_type:
          type: string
          example: friend
        message:
          type: string
          nullable: true
          description: Optional note the requester attached.
          example: We played at Gulshan last Friday — let's link up.
        created_at:
          type: string
          format: date-time
          example: '2026-07-16T19:00:00.000Z'
        responded_at:
          type: string
          format: date-time
          nullable: true
          description: '`null` while still pending.'
          example: '2026-07-16T19:20:00.000Z'

    # ---- shared object shapes ----------------------------------------------
    UserSummary:
      type: object
      description: The public-safe subset of a user returned inside other payloads.
      required: [id]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        first_name:
          type: string
          nullable: true
          example: Rafi
        last_name:
          type: string
          nullable: true
          example: Ahmed
        profile_picture_url:
          type: string
          format: uri
          nullable: true
          example: https://res.cloudinary.com/funturf/image/upload/v1718000000/images/rafi.jpg

    TurfmateProfile:
      type: object
      description: |
        The connection-facing profile (`PROFILE_SELECT` in
        `turfmate.controller.js`) — adds home area and bio to `UserSummary`.
      required: [id]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        first_name:
          type: string
          nullable: true
          example: Rafi
        last_name:
          type: string
          nullable: true
          example: Ahmed
        profile_picture_url:
          type: string
          format: uri
          nullable: true
          example: https://res.cloudinary.com/funturf/image/upload/v1718000000/images/rafi.jpg
        division:
          type: string
          nullable: true
          example: Dhaka
        district:
          type: string
          nullable: true
          example: Gulshan
        bio:
          type: string
          nullable: true
          example: Left winger. Free most evenings after 8.

    # ---- teams --------------------------------------------------------------
    TeamMemberRole:
      type: string
      description: |
        Authority inside a team (`team_member_role`). `captain` is single per team
        and mirrors `teams.captain_id` — it changes only through
        `POST /teams/{teamId}/transfer-captaincy`, never through a member PATCH.
        `co_captain` may send and cancel invites. `member` is roster-only.
      enum:
        - captain
        - co_captain
        - member
      example: member

    TeamMemberStatus:
      type: string
      description: |
        Membership state (`team_member_status`). Only `active` counts as being on
        the roster; `left` (self-initiated) and `removed` (captain-initiated) are
        retained for history and never satisfy an authorization check.
      enum:
        - active
        - left
        - removed
      example: active

    TeamInviteStatus:
      type: string
      description: |
        Invitation lifecycle (`team_invite_status`). `cancelled` = withdrawn by the
        team before a reply; `declined` = refused by the player. A `declined` or
        `cancelled` invite can be revived by re-inviting the same player.
      enum:
        - pending
        - accepted
        - declined
        - cancelled
      example: pending

    SportSummary:
      type: object
      description: A row from `sports`, as embedded in a team.
      required: [id, name]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
          example: Football
        category:
          type: string
          nullable: true
          example: team
        icon_url:
          type: string
          format: uri
          nullable: true

    SportPosition:
      type: object
      description: A playable position for one sport (`sport_positions`).
      required: [id, position_name]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        position_name:
          type: string
          example: Centre Back
        position_code:
          type: string
          nullable: true
          example: CB

    Team:
      type: object
      description: |
        A persistent squad. `my_role` is the CALLING user's role on this team and
        is `null` for a non-member — it drives UI gating only; the server re-checks
        authorization on every write.
      required: [id, name, sport_id, captain_id]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
          maxLength: 100
          example: Gulshan United
        sport_id:
          $ref: '#/components/schemas/Uuid'
        captain_id:
          $ref: '#/components/schemas/Uuid'
        home_area:
          type: string
          nullable: true
          description: District/division the team plays out of.
          example: Gulshan
        crest_url:
          type: string
          format: uri
          nullable: true
        description:
          type: string
          nullable: true
          example: Tuesday and Friday nights, 7-a-side.
        is_active:
          type: boolean
          description: '`false` once the captain disbands the team (soft delete).'
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        sports:
          $ref: '#/components/schemas/SportSummary'
        captain:
          $ref: '#/components/schemas/TurfmateProfile'
        member_count:
          type: integer
          description: Active roster size.
          example: 9
        my_role:
          allOf:
            - $ref: '#/components/schemas/TeamMemberRole'
          nullable: true

    TeamMember:
      type: object
      description: |
        One roster entry. The player's form (`rating`, `reliability_score`) is
        joined server-side from `player_profiles` so the client never N+1s a
        profile fetch per member.
      required: [membershipId, role, status, user]
      properties:
        membershipId:
          $ref: '#/components/schemas/Uuid'
        role:
          $ref: '#/components/schemas/TeamMemberRole'
        status:
          $ref: '#/components/schemas/TeamMemberStatus'
        joined_at:
          type: string
          format: date-time
          nullable: true
        left_at:
          type: string
          format: date-time
          nullable: true
        position:
          allOf:
            - $ref: '#/components/schemas/SportPosition'
          nullable: true
        user:
          allOf:
            - $ref: '#/components/schemas/TurfmateProfile'
            - type: object
              properties:
                profile:
                  type: object
                  nullable: true
                  description: The player's `player_profiles` row, or `null`.
                  properties:
                    rating:
                      type: number
                      nullable: true
                      example: 4.5
                    reliability_score:
                      type: integer
                      nullable: true
                      example: 96
                    skill_level:
                      type: string
                      nullable: true
                      example: intermediate
                    preferred_foot:
                      type: string
                      nullable: true
                      example: right
                    jersey_number:
                      type: integer
                      nullable: true
                      example: 10

    TeamInvite:
      type: object
      description: A raw `team_invites` row, as returned by the write endpoints.
      required: [id, team_id, invited_user_id, invited_by, status]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        team_id:
          $ref: '#/components/schemas/Uuid'
        invited_user_id:
          $ref: '#/components/schemas/Uuid'
        invited_by:
          $ref: '#/components/schemas/Uuid'
        status:
          $ref: '#/components/schemas/TeamInviteStatus'
        message:
          type: string
          nullable: true
          example: We're short a keeper on Fridays — join us?
        created_at:
          type: string
          format: date-time
        responded_at:
          type: string
          format: date-time
          nullable: true

    Address:
      type: object
      description: |
        Bangladesh address, mapped onto the turf columns:
        `area -> address_line_1`, `district -> city`, `division -> state`.
      properties:
        city:
          type: string
          nullable: true
          description: District.
          example: Gulshan
        state:
          type: string
          nullable: true
          description: Division.
          example: Dhaka
        postal_code:
          type: string
          nullable: true
          example: '1212'
        country:
          type: string
          nullable: true
          default: Bangladesh
          example: Bangladesh
        latitude:
          type: number
          format: double
          nullable: true
          minimum: -90
          maximum: 90
          example: 23.7925
        longitude:
          type: number
          format: double
          nullable: true
          minimum: -180
          maximum: 180
          example: 90.4078

    OperatingHours:
      type: object
      description: Stored as `{ open, close }` JSON; always serialized in this shape.
      properties:
        opening_time:
          type: string
          nullable: true
          example: '06:00'
        closing_time:
          type: string
          nullable: true
          example: '23:59'

    # ---- users --------------------------------------------------------------
    PlayerProfile:
      type: object
      nullable: true
      description: The user's sporting profile (`player_profiles`). `null` if never filled in.
      properties:
        preferred_positions:
          type: array
          nullable: true
          items:
            type: string
          example: [left_wing, striker]
        skill_level:
          type: string
          nullable: true
          example: intermediate
        years_of_experience:
          type: integer
          nullable: true
          example: 6
        preferred_foot:
          type: string
          nullable: true
          example: left
        jersey_number:
          type: integer
          nullable: true
          example: 11
        height_cm:
          type: number
          nullable: true
          example: 174
        weight_kg:
          type: number
          nullable: true
          example: 68
        achievements:
          description: Free-form JSON. May be `null`.
          example: [Runner-up — Gulshan Corporate Cup 2024]
        sports_played:
          type: array
          nullable: true
          items:
            type: string
          example: [football, cricket]
        availability_schedule:
          description: Free-form JSON. May be `null`.
          example:
            fri: [evening]
            sat: [morning, evening]
        preferred_play_time:
          type: string
          nullable: true
          example: evening
        max_travel_distance_km:
          type: number
          nullable: true
          example: 12
        rating:
          type: number
          format: double
          nullable: true
          description: Player reputation rating.
          example: 4.3
        total_games_played:
          type: integer
          nullable: true
          example: 38
        total_games_organized:
          type: integer
          nullable: true
          example: 5
        reliability_score:
          type: number
          format: double
          nullable: true
          example: 92.5

    ProfileCompletion:
      type: object
      description: |
        How complete a profile is, scored **server-side** against the weighted
        checklist in `utils/profileService.js` so the client never duplicates the
        rules. Weights reflect how much a field helps other people find and pick
        you — a photo and a skill level count for more than a jersey number.
        `missing` carries the label and hint the UI renders, so the checklist is
        generated entirely from this payload.
      properties:
        percent:
          type: integer
          description: Weighted completion, 0–100.
          example: 65
        earned:
          type: integer
          description: Weight earned so far.
          example: 19
        total:
          type: integer
          description: Total weight available.
          example: 29
        filled_count:
          type: integer
          example: 11
        total_count:
          type: integer
          description: Number of checklist fields.
          example: 19
        completed:
          type: array
          items: { type: string }
          example: [profile_picture_url, bio, district]
        missing:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                example: skill_level
              label:
                type: string
                example: Skill level
              hint:
                type: string
                example: Gets you matched to the right games
              weight:
                type: integer
                example: 3
              source:
                type: string
                enum: [user, player]
                description: Which table the field lives on.

    UserProfile:
      type: object
      description: |
        Full public profile returned by `GET /users/{user_id}`. Aggregates
        (`eventsJoined`, `gamesOrganized`, `friends`) are counted live.
      required:
        - id
        - email
        - first_name
        - last_name
        - user_type
        - sports
        - eventsJoined
        - gamesOrganized
        - friends
        - username
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        email:
          type: string
          format: email
          example: rafi@example.com
        phone:
          type: string
          nullable: true
          example: '+8801712345678'
        first_name:
          type: string
          example: Rafi
        last_name:
          type: string
          example: Ahmed
        date_of_birth:
          type: string
          format: date
          nullable: true
          example: '1998-03-14'
        gender:
          type: string
          nullable: true
          example: male
        profile_picture_url:
          type: string
          format: uri
          nullable: true
          example: https://res.cloudinary.com/funturf/image/upload/v1718000000/images/rafi.jpg
        cover_photo_url:
          type: string
          format: uri
          nullable: true
          description: |
            Wide profile banner. Stored **already cropped** to the banner aspect by
            the client, so it renders with a plain `object-cover` and no
            focal-point maths.
          example: https://i.ibb.co/abc123/cover.jpg
        profile_completion:
          $ref: '#/components/schemas/ProfileCompletion'
        bio:
          type: string
          nullable: true
          example: Left winger. Free most evenings after 8.
        division:
          type: string
          nullable: true
          example: Dhaka
        district:
          type: string
          nullable: true
          example: Gulshan
        latitude:
          type: number
          format: double
          nullable: true
          example: 23.7925
        longitude:
          type: number
          format: double
          nullable: true
          example: 90.4078
        user_type:
          $ref: '#/components/schemas/UserType'
        status:
          type: string
          nullable: true
          example: active
        email_verified:
          type: boolean
          nullable: true
          example: false
        phone_verified:
          type: boolean
          nullable: true
          example: false
        preferred_language:
          type: string
          nullable: true
          example: en
        timezone:
          type: string
          nullable: true
          example: Asia/Dhaka
        last_login_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-15T18:22:04.000Z'
        created_at:
          type: string
          format: date-time
          example: '2025-11-02T09:14:00.000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-07-15T18:22:04.000Z'
        player_profile:
          $ref: '#/components/schemas/PlayerProfile'
        sports:
          type: array
          description: Convenience mirror of `player_profile.sports_played` (empty when no profile).
          items:
            type: string
          example: [football, cricket]
        eventsJoined:
          type: integer
          description: Count of `approved` participations.
          example: 38
        gamesOrganized:
          type: integer
          description: Count of events where the user is the organizer.
          example: 5
        friends:
          type: integer
          description: Accepted connections in either direction.
          example: 24
        rating:
          type: number
          format: double
          nullable: true
          description: Flattened `player_profile.rating`.
          example: 4.3
        username:
          type: string
          description: Derived — the local part of the email. Not stored, not unique.
          example: rafi

    AuthUser:
      type: object
      description: |
        The account + token bundle returned by register/login.

        No credential material is ever returned: `password_hash` is not selected
        on register, and login strips it after comparing.
      required:
        - id
        - email
        - first_name
        - last_name
        - user_type
        - accessToken
        - refreshToken
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        email:
          type: string
          format: email
          example: rafi@example.com
        first_name:
          type: string
          example: Rafi
        last_name:
          type: string
          example: Ahmed
        status:
          type: string
          nullable: true
          example: active
        user_type:
          $ref: '#/components/schemas/UserType'
        bio:
          type: string
          nullable: true
          example: Left winger. Free most evenings after 8.
        email_verified:
          type: boolean
          nullable: true
          example: false
        phone_verified:
          type: boolean
          nullable: true
          example: false
        profile_picture_url:
          type: string
          format: uri
          nullable: true
          example: https://res.cloudinary.com/funturf/image/upload/v1718000000/images/rafi.jpg
        accessToken:
          type: string
          description: 'JWT for the `Authorization: Bearer` header.'
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjNmMWMyYjdlIiwiZW1haWwiOiJyYWZpQGV4YW1wbGUuY29tIn0.7sVQ1n0m2k3l4j5h6g7f8d9s0a1p2o3i4u5y6t7r8e9
        refreshToken:
          type: string
          description: Sent to `/users/refresh` to mint a new pair.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjNmMWMyYjdlIn0.9x8c7v6b5n4m3k2j1h0g9f8d7s6a5p4o3i2u1y0t9r8
        tokenExpiresIn:
          type: string
          description: Mirrors `ACCESS_TOKEN_EXPIRY` (a duration string, not seconds).
          example: 1d

    LoginUser:
      allOf:
        - $ref: '#/components/schemas/AuthUser'
        - type: object
          description: |
            Login adds `username` on top of the account + token bundle.

            It carries **no activity aggregates**. Read `GET /users/{user_id}` for
            `eventsJoined`, `gamesOrganized`, `friends` and `sports` — that
            endpoint counts them live.
          properties:
            username:
              type: string
              description: Derived — the local part of the email. Not stored, not unique.
              example: rafi

    # ---- venues / grounds ---------------------------------------------------
    Ground:
      type: object
      description: A single playing surface within a turf.
      required: [id, turf_id, name, hourly_rate]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        turf_id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
          example: Ground A (7-a-side)
        ground_type:
          type: string
          nullable: true
          # Prisma client names (mapped to '5x5'/'7x7'/'11x11' in the DB).
          enum: [v5x5, v6x6, v7x7, v11x11, cricket_pitch, tennis_court, badminton_court, custom]
          example: v7x7
        sport_type:
          type: array
          description: Sports this ground hosts. At least one is required on write.
          items:
            type: string
          example: [football]
        surface_type:
          type: string
          nullable: true
          enum: [natural_grass, artificial_grass, clay, concrete, synthetic, other]
          example: artificial_grass
        dimensions_length_m:
          type: number
          nullable: true
          example: 45
        dimensions_width_m:
          type: number
          nullable: true
          example: 30
        capacity_players:
          type: integer
          nullable: true
          example: 14
        hourly_rate:
          type: number
          format: double
          description: Base rate in `currency`. Must be > 0.
          example: 2500
        weekend_hourly_rate:
          type: number
          format: double
          nullable: true
          example: 3000
        peak_hour_rate:
          type: number
          format: double
          nullable: true
          example: 3500
        off_peak_hour_rate:
          type: number
          format: double
          nullable: true
          example: 2000
        currency:
          type: string
          default: BDT
          example: BDT
        minimum_booking_hours:
          type: number
          nullable: true
          example: 1.5
        maximum_booking_hours:
          type: number
          nullable: true
          example: 3
        status:
          type: string
          description: Only an `available` ground is bookable.
          enum: [available, maintenance, unavailable]
          example: available
        amenities:
          type: array
          nullable: true
          items:
            type: string
          example: [floodlights, changing_room]
        images:
          type: array
          nullable: true
          items:
            type: string
            format: uri
          example: [https://res.cloudinary.com/funturf/image/upload/v1718000000/images/ground-a.jpg]
        notes:
          type: string
          nullable: true
          example: Nets replaced March 2026.
        created_at:
          type: string
          format: date-time
          example: '2025-12-01T10:00:00.000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-06-11T08:30:00.000Z'

    GroundFields:
      type: object
      description: |
        Client-settable ground columns, all optional — the shared field set behind
        `GroundWrite` (create) and the partial ground update.

        `turf_id` and `status` are set by the server on create and can never be
        supplied by a client (a ground can't be attached to someone else's turf).
        Blank strings are coerced to `null`.
      properties:
        name:
          type: string
          example: Ground A (7-a-side)
        sport_type:
          description: A single sport or a list. Must resolve to at least one.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
              minItems: 1
          example: [football]
        hourly_rate:
          type: number
          format: double
          description: Must be greater than 0. Numeric strings are accepted and cast.
          example: 2500
        ground_type:
          type: string
          nullable: true
          # Prisma client names (mapped to '5x5'/'7x7'/'11x11' in the DB).
          enum: [v5x5, v6x6, v7x7, v11x11, cricket_pitch, tennis_court, badminton_court, custom]
          example: v7x7
        surface_type:
          type: string
          nullable: true
          enum: [natural_grass, artificial_grass, clay, concrete, synthetic, other]
          example: artificial_grass
        dimensions_length_m:
          type: number
          nullable: true
          example: 45
        dimensions_width_m:
          type: number
          nullable: true
          example: 30
        capacity_players:
          type: integer
          nullable: true
          example: 14
        weekend_hourly_rate:
          type: number
          nullable: true
          example: 3000
        peak_hour_rate:
          type: number
          nullable: true
          example: 3500
        off_peak_hour_rate:
          type: number
          nullable: true
          example: 2000
        currency:
          type: string
          default: BDT
          example: BDT
        minimum_booking_hours:
          type: number
          nullable: true
          example: 1.5
        maximum_booking_hours:
          type: number
          nullable: true
          example: 3
        amenities:
          type: array
          nullable: true
          items:
            type: string
          example: [floodlights, changing_room]
        images:
          type: array
          nullable: true
          items:
            type: string
            format: uri
          example: [https://res.cloudinary.com/funturf/image/upload/v1718000000/images/ground-a.jpg]
        notes:
          type: string
          nullable: true
          example: Nets replaced March 2026.

    GroundWrite:
      allOf:
        - $ref: '#/components/schemas/GroundFields'
        - type: object
          description: |
            A ground as supplied on **create**. The DB enforces name + rate; the
            API also requires a sport so the ground is discoverable and bookable.
          required: [name, sport_type, hourly_rate]

    Venue:
      type: object
      description: A turf (venue) DTO as shaped by `VenueSerializer.toDto`.
      required: [id, name, address_line_1, grounds]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        admin_user_id:
          allOf:
            - $ref: '#/components/schemas/Uuid'
          description: The owning `turf_admin`.
        name:
          type: string
          example: Gulshan Sports Arena
        slug:
          type: string
          nullable: true
          example: gulshan-sports-arena
        description:
          type: string
          nullable: true
          example: Two floodlit 7-a-side pitches with parking.
        address_line_1:
          $ref: '#/components/schemas/Address'
        address_line_2:
          type: string
          nullable: true
          example: House 42, Road 11
        phone:
          type: string
          nullable: true
          example: '+8801812345678'
        email:
          type: string
          format: email
          nullable: true
          example: bookings@gulshanarena.com
        website_url:
          type: string
          format: uri
          nullable: true
          example: https://gulshanarena.com
        establishment_year:
          type: integer
          nullable: true
          example: 2019
        total_grounds:
          type: integer
          example: 2
        rules_and_regulations:
          type: string
          nullable: true
          example: No metal studs. Turf shoes only.
        cancellation_policy:
          type: string
          nullable: true
          example: Free cancellation up to 2 days before.
        advance_booking_days:
          type: integer
          nullable: true
          description: How far ahead a slot may be booked. Enforced on create (`BOOKING_TOO_FAR_AHEAD`).
          example: 30
        status:
          type: string
          description: New turfs start at `pending_approval`.
          enum: [pending_approval, active, suspended, inactive]
          example: active
        verified:
          type: boolean
          description: Only a verified turf accepts bookings (`TURF_NOT_VERIFIED`).
          example: true
        total_bookings:
          type: integer
          example: 412
        sports_available:
          type: array
          nullable: true
          description: Union of every ground's sports; kept in sync on ground create.
          items:
            type: string
          example: [football, cricket]
        facilities:
          type: array
          nullable: true
          items:
            type: string
          example: [parking, washroom, cafeteria]
        rating:
          type: number
          format: double
          description: Average of approved turf reviews. `0` when never rated.
          example: 4.6
        rating_count:
          type: integer
          description: Number of approved turf reviews. Present on the detail read only.
          example: 38
        my_rating:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
          description: |
            The caller's own star rating. Detail read only, and only when the
            request carried a valid token — `null` otherwise.
          example: 5
        operating_hours:
          $ref: '#/components/schemas/OperatingHours'
        images:
          type: array
          nullable: true
          items:
            type: string
            format: uri
          example: [https://res.cloudinary.com/funturf/image/upload/v1718000000/images/arena.jpg]
        grounds:
          type: array
          items:
            $ref: '#/components/schemas/Ground'
        created_at:
          type: string
          format: date-time
          example: '2025-12-01T10:00:00.000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-06-11T08:30:00.000Z'

    VenueListItem:
      type: object
      description: |
        Trimmed venue for the browse grid (`VenueSerializer.toVenueListDto`).
        Carries only the fields a card renders.
      required: [id, name]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
          example: Gulshan Sports Arena
        address_line_1:
          $ref: '#/components/schemas/Address'
        address_line_2:
          type: string
          nullable: true
          example: House 42, Road 11
        status:
          type: string
          nullable: true
          example: active
        verified:
          type: boolean
          nullable: true
          example: true
        sports_available:
          type: array
          nullable: true
          items:
            type: string
          example: [football]
        rating:
          type: number
          format: double
          example: 4.6
        operating_hours:
          $ref: '#/components/schemas/OperatingHours'
        images:
          type: array
          nullable: true
          items:
            type: string
            format: uri
          example: [https://res.cloudinary.com/funturf/image/upload/v1718000000/images/arena.jpg]
        grounds:
          type: array
          description: Minimal ground stubs (`id`, `name`, `sport_type`).
          items:
            type: object
            properties:
              id:
                $ref: '#/components/schemas/Uuid'
              name:
                type: string
                example: Ground A (7-a-side)
              sport_type:
                type: array
                items:
                  type: string
                example: [football]

    VenueNameListItem:
      type: object
      description: Id/name pairs for pickers (`GET /venues/list`).
      required: [id, name, grounds]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
          example: Gulshan Sports Arena
        grounds:
          type: array
          items:
            type: object
            properties:
              id:
                $ref: '#/components/schemas/Uuid'
              name:
                type: string
                example: Ground A (7-a-side)
              sport_type:
                type: array
                items:
                  type: string
                example: [football]

    # ---- bookings -----------------------------------------------------------
    BookingSlot:
      type: object
      description: The slot a booking occupies, denormalized onto the row as JSON.
      required: [code]
      properties:
        code:
          $ref: '#/components/schemas/SlotCode'
        start_time:
          type: string
          example: '18:00'
        end_time:
          type: string
          example: '19:30'

    SlotGrid:
      type: object
      description: |
        Availability for one ground on one date.

        A `slots` row is an **exceptions** record: every slot defaults to open, so
        "no row" means the whole day is free and a new ground is bookable with no
        seeding. Each `t*` boolean is `true` when the slot is open (admin-enabled
        and not paid-locked).

        A `true` boolean does **not** mean nothing is there — an unpaid hold does
        not lock a slot. Cross-reference `held_slots` to render
        "held — book with payment to take it".
      required: [ground_id, date, held_slots, my_slots]
      properties:
        ground_id:
          $ref: '#/components/schemas/Uuid'
        date:
          type: string
          format: date-time
          example: '2026-07-20T00:00:00.000Z'
        t0000:
          type: boolean
          example: true
        t0130:
          type: boolean
          example: true
        t0300:
          type: boolean
          example: true
        t0430:
          type: boolean
          example: true
        t0600:
          type: boolean
          example: true
        t0730:
          type: boolean
          example: true
        t0900:
          type: boolean
          example: true
        t1030:
          type: boolean
          example: true
        t1200:
          type: boolean
          example: true
        t1330:
          type: boolean
          example: true
        t1500:
          type: boolean
          example: true
        t1630:
          type: boolean
          example: true
        t1800:
          type: boolean
          example: false
        t1930:
          type: boolean
          example: true
        t2100:
          type: boolean
          example: true
        t2230:
          type: boolean
          example: true
        held_slots:
          type: array
          description: |
            Slots held by an *unpaid* booking. Still `true` in the grid — a paid
            booking can take them (which supersedes and notifies the holder), a
            second unpaid request cannot (`SLOT_HELD_UNPAID`).
          items:
            $ref: '#/components/schemas/SlotCode'
          example: [t1930]
        my_slots:
          type: array
          description: |
            The caller's own active bookings on this ground/date. Empty for
            anonymous callers — send a token to populate it.
          items:
            type: object
            properties:
              code:
                $ref: '#/components/schemas/SlotCode'
              booking_id:
                $ref: '#/components/schemas/Uuid'
              booking_status:
                $ref: '#/components/schemas/BookingStatus'
              payment_status:
                $ref: '#/components/schemas/PaymentStatus'
          example:
            - code: t1930
              booking_id: 8c2d1f0a-3b4e-4a5c-9d6e-7f8a9b0c1d2e
              booking_status: pending
              payment_status: pending

    PriceQuote:
      type: object
      description: |
        A price preview. Uses the same `computeSlotPricing` maths as a real
        booking, so the quote and the created booking always agree.
      required:
        - isAvailable
        - slot
        - booking_date
        - slot_time
        - base_rate
        - discount
        - final_price
      properties:
        isAvailable:
          type: boolean
          description: Always `true` here — an unavailable slot fails with `SLOT_UNAVAILABLE` instead.
          example: true
        reason:
          type: string
          nullable: true
          example: null
        slot:
          $ref: '#/components/schemas/SlotCode'
        booking_date:
          type: string
          format: date
          example: '2026-07-20'
        slot_time:
          type: string
          description: The slot's start time.
          example: '18:00'
        day_of_week:
          type: integer
          minimum: 0
          maximum: 6
          description: 0 = Sunday.
          example: 1
        is_peak:
          type: boolean
          example: true
        is_weekend:
          type: boolean
          example: false
        base_rate:
          type: number
          format: double
          description: Rate before any discount (peak/weekend/off-peak applied).
          example: 3500
        discount:
          type: number
          format: double
          description: Absolute discount applied. `0` when no coupon resolved.
          example: 350
        final_price:
          type: number
          format: double
          description: '`base_rate - discount`. What the booking is created with.'
          example: 3150
        promotion:
          type: object
          nullable: true
          description: The coupon that produced `discount`, if any.
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            code:
              type: string
              example: EID10
          example:
            id: 5d4c3b2a-1e0f-4a9b-8c7d-6e5f4a3b2c1d
            code: EID10

    Booking:
      type: object
      description: A slot reservation.
      required:
        - id
        - ground_id
        - user_id
        - booking_date
        - slot
        - booking_status
        - payment_status
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        ground_id:
          $ref: '#/components/schemas/Uuid'
        user_id:
          allOf:
            - $ref: '#/components/schemas/Uuid'
          description: The booker.
        event_id:
          type: string
          format: uuid
          nullable: true
          description: The match this reservation backs, if attached.
        booking_date:
          type: string
          format: date-time
          description: Stored as a `@db.Date` at UTC midnight.
          example: '2026-07-20T00:00:00.000Z'
        slot:
          $ref: '#/components/schemas/BookingSlot'
        total_amount:
          type: number
          format: double
          description: The base rate before discount.
          example: 3500
        discount_amount:
          type: number
          format: double
          example: 350
        final_amount:
          type: number
          format: double
          description: What the player owes. Only counted as revenue once `payment_status` is `completed`.
          example: 3150
        booking_status:
          $ref: '#/components/schemas/BookingStatus'
        payment_status:
          $ref: '#/components/schemas/PaymentStatus'
        payment_method:
          type: string
          nullable: true
          example: bkash
        transaction_id:
          type: string
          nullable: true
          description: Payment reference. Unique across active bookings (`DUPLICATE_TRANSACTION`).
          example: TRX8H2K9QX1
        payment_proof_url:
          type: string
          format: uri
          nullable: true
          description: Must be a FunTurf-hosted image (`INVALID_PAYMENT_PROOF`).
          example: https://res.cloudinary.com/funturf/image/upload/v1718000000/images/proof-8h2k.jpg
        notes:
          type: string
          nullable: true
          example: Please keep the floodlights on until 20:00.
        admin_notes:
          type: string
          nullable: true
          example: Verified against bKash statement.
        check_in_time:
          type: string
          format: date-time
          nullable: true
          description: Set once at the gate. A second check-in fails (`ALREADY_CHECKED_IN`).
          example: null
        cancelled_by:
          type: string
          format: uuid
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        cancellation_reason:
          type: string
          nullable: true
          example: superseded_by_paid_booking
        cancellation_requested_by:
          type: string
          format: uuid
          nullable: true
          description: |
            Set while a mutual cancellation is open on a confirmed booking. The
            *other* party must answer via `/cancel/respond`.
        hold_expires_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Live countdown for an unpaid hold (2h TTL), read from the slot lock.
            Present on `GET /bookings/my`; `null` once paid or confirmed.
          example: '2026-07-16T20:12:00.000Z'
        created_at:
          type: string
          format: date-time
          example: '2026-07-16T18:12:00.000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-07-16T18:12:00.000Z'

    BookingWithRelations:
      allOf:
        - $ref: '#/components/schemas/Booking'
        - type: object
          description: A booking hydrated with its ground/turf, booker, coupon and event trust.
          properties:
            grounds:
              type: object
              description: The ground and its owning turf.
              properties:
                id:
                  $ref: '#/components/schemas/Uuid'
                name:
                  type: string
                  example: Ground A (7-a-side)
                turfs:
                  type: object
                  properties:
                    id:
                      $ref: '#/components/schemas/Uuid'
                    name:
                      type: string
                      example: Gulshan Sports Arena
                    city:
                      type: string
                      nullable: true
                      example: Gulshan
                    admin_user_id:
                      $ref: '#/components/schemas/Uuid'
            users_bookings_user_idTousers:
              allOf:
                - $ref: '#/components/schemas/UserSummary'
              description: The booking's owner (Prisma relation name).
            promotion_usage:
              type: array
              description: The applied coupon, for the ticket's price breakdown.
              items:
                type: object
                properties:
                  discount_amount:
                    type: number
                    format: double
                    example: 350
                  promotions:
                    type: object
                    properties:
                      code:
                        type: string
                        example: EID10
            event_trust:
              type: object
              nullable: true
              description: |
                Snapshot of the attached match so an admin can judge the game
                before confirming payment. `null` when no event is attached.
              properties:
                id:
                  $ref: '#/components/schemas/Uuid'
                title:
                  type: string
                  example: Friday Night 7s
                organizer:
                  $ref: '#/components/schemas/UserSummary'
                approved_count:
                  type: integer
                  description: Size of the confirmed squad.
                  example: 11

    DashboardStats:
      type: object
      description: |
        Analytics roll-up for the turf-admin Overview tab, derived entirely from
        existing tables. Scoped to the caller's turfs; `super_admin` sees the whole
        platform.

        **Realized revenue** counts only `payment_status: completed` (admin-verified).
        A `partial` claim is money awaiting verification and is surfaced as an
        action item, never as earned.
      required: [kpis, series, status_breakdown, top_grounds]
      properties:
        kpis:
          type: object
          required:
            - revenue_all
            - revenue_month
            - bookings_total
            - bookings_month
            - upcoming
            - pending_verifications
            - unique_players
            - grounds
            - turfs
            - occupancy_pct
          properties:
            revenue_all:
              type: number
              format: double
              description: All-time realized revenue.
              example: 842500
            revenue_month:
              type: number
              format: double
              description: Realized revenue created since the 1st of this month.
              example: 96300
            bookings_total:
              type: integer
              example: 412
            bookings_month:
              type: integer
              example: 47
            upcoming:
              type: integer
              description: Pending/confirmed bookings dated today or later.
              example: 18
            pending_verifications:
              type: integer
              description: Paid claims awaiting admin action.
              example: 3
            unique_players:
              type: integer
              example: 128
            grounds:
              type: integer
              example: 2
            turfs:
              type: integer
              example: 1
            avg_rating:
              type: number
              format: double
              nullable: true
              description: '`null` when never rated.'
              example: 4.6
            rating_count:
              type: integer
              example: 38
            occupancy_pct:
              type: number
              format: double
              description: |
                Rough 30-day occupancy: confirmed/completed slots vs theoretical
                capacity (grounds x 16 slots/day x 30 days).
              example: 34.2
        series:
          type: array
          description: Exactly 30 zero-filled daily buckets, oldest first (inclusive of today).
          items:
            type: object
            required: [date, bookings, revenue]
            properties:
              date:
                type: string
                format: date
                example: '2026-07-16'
              bookings:
                type: integer
                example: 4
              revenue:
                type: number
                format: double
                description: Realized revenue for that day.
                example: 9450
        status_breakdown:
          type: array
          items:
            type: object
            properties:
              status:
                $ref: '#/components/schemas/BookingStatus'
              count:
                type: integer
                example: 212
        top_grounds:
          type: array
          description: Top 5 grounds by realized revenue.
          items:
            type: object
            properties:
              ground_id:
                $ref: '#/components/schemas/Uuid'
              name:
                type: string
                example: Ground A (7-a-side)
              revenue:
                type: number
                format: double
                example: 512000
              bookings:
                type: integer
                example: 164
        recent_bookings:
          type: array
          description: 6 newest bookings.
          items:
            $ref: '#/components/schemas/BookingWithRelations'
        upcoming_bookings:
          type: array
          description: Next 6 pending/confirmed bookings.
          items:
            $ref: '#/components/schemas/BookingWithRelations'
        pending_verifications_list:
          type: array
          description: 6 newest claims awaiting verification.
          items:
            $ref: '#/components/schemas/BookingWithRelations'

    # ---- events -------------------------------------------------------------
    EventStatus:
      type: string
      description: |
        `open`/`ready`/`booked` are live states that appear in feeds. `completed`
        and `cancelled` are terminal — such a match can no longer be edited
        (`EVENT_NOT_EDITABLE`) or joined. Deleting a match soft-cancels it.
      enum: [open, ready, booked, completed, cancelled]
      example: open

    EventParticipant:
      type: object
      description: One row of a match's roster.
      required: [user_id, status]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        event_id:
          $ref: '#/components/schemas/Uuid'
        user_id:
          $ref: '#/components/schemas/Uuid'
        payment_status:
          type: string
          nullable: true
          description: The player's own share, not the booking's payment.
          example: pending
        approved_at:
          type: string
          format: date-time
          nullable: true
          description: '`null` while still `requested` or `invited`.'
          example: null
        status:
          $ref: '#/components/schemas/ParticipantStatus'
        role:
          type: string
          description: '`co_organizer` may moderate join requests.'
          enum: [player, co_organizer]
          example: player
        joined_at:
          type: string
          format: date-time
          example: '2026-07-10T11:02:00.000Z'
        users:
          allOf:
            - $ref: '#/components/schemas/UserSummary'
          description: >-
            On the detail read the squad card also gets public profile extras:
            `district`, `division` (home area) and flattened player stats
            (`skill_level`, `total_games_played`, `rating`) — used for the squad
            member's role badge, join date and at-a-glance stats.

    Event:
      type: object
      description: |
        A match, as returned by the detail read (`EventSerializer.toDto`).

        **Schedule rule:** the time is either driven by an attached booking, or is
        a *probable* range the organizer set by hand. `schedule_confirmed` tells
        which. Hand-setting the time on a booked match is rejected
        (`EVENT_SCHEDULE_LOCKED`).
      required:
        - id
        - title
        - sport_type
        - min_players
        - max_players
        - current_players
        - schedule_confirmed
        - participants
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        team_id:
          allOf:
            - $ref: '#/components/schemas/Uuid'
          nullable: true
          description: |
            The organizing team, or `null` for an ordinary teamless match (still
            the default). Only a tag — it does not change the join/roster flow.
        title:
          type: string
          example: Friday Night 7s
        description:
          type: string
          nullable: true
          example: Casual 7-a-side. Bring a dark and a light shirt.
        sport_type:
          type: string
          example: football
        event_date:
          type: string
          format: date
          nullable: true
          example: '2026-07-24'
        start_time:
          type: string
          nullable: true
          example: '18:00'
        end_time:
          type: string
          nullable: true
          example: '19:30'
        min_players:
          type: integer
          example: 10
        max_players:
          type: integer
          example: 14
        current_players:
          type: integer
          description: |
            Size of the approved roster, organizer included. Server-derived —
            never client-settable.
          example: 11
        event_type:
          type: string
          example: friendly
        skill_level_required:
          type: string
          example: intermediate
        entry_fee:
          type: number
          format: double
          nullable: true
          example: 300
        total_cost:
          type: number
          format: double
          nullable: true
          example: 3500
        cost_split_type:
          type: string
          example: equal
        visibility:
          type: string
          description: Only `public` matches appear in the nearby search.
          enum: [public, private, turfmates_only]
          example: public
        ground_id:
          $ref: '#/components/schemas/Uuid'
        venue_id:
          $ref: '#/components/schemas/Uuid'
        status:
          $ref: '#/components/schemas/EventStatus'
        schedule_confirmed:
          type: boolean
          description: '`true` when a booking backs the time; otherwise start/end are probable.'
          example: true
        organizer:
          $ref: '#/components/schemas/UserSummary'
        ground:
          type: object
          nullable: true
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            name:
              type: string
              example: Ground A (7-a-side)
            turf:
              type: object
              nullable: true
              properties:
                id:
                  $ref: '#/components/schemas/Uuid'
                name:
                  type: string
                  example: Gulshan Sports Arena
                address_line_1:
                  $ref: '#/components/schemas/Address'
        booking:
          type: object
          nullable: true
          description: The attached reservation. `null` when the match has no booking.
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            booking_date:
              type: string
              format: date-time
              example: '2026-07-24T00:00:00.000Z'
            slot:
              $ref: '#/components/schemas/BookingSlot'
            total_amount:
              type: number
              format: double
              example: 3500
            discount_amount:
              type: number
              format: double
              example: 0
            final_amount:
              type: number
              format: double
              example: 3500
            payment_status:
              $ref: '#/components/schemas/PaymentStatus'
            booking_status:
              $ref: '#/components/schemas/BookingStatus'
            hold_expires_at:
              type: string
              format: date-time
              nullable: true
              description: Present only while the booking is an unpaid hold.
              example: null
        participants:
          type: array
          items:
            $ref: '#/components/schemas/EventParticipant'
        comments:
          type: array
          description: Raw `event_comments` rows attached to the detail read.
          items:
            type: object

    EventFeedItem:
      type: object
      description: A match as rendered on the paginated feed card.
      required: [id, title, sport_type, min_players, max_players, current_players]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        title:
          type: string
          example: Friday Night 7s
        description:
          type: string
          nullable: true
          example: Casual 7-a-side. Bring a dark and a light shirt.
        organizer_id:
          $ref: '#/components/schemas/Uuid'
        users:
          allOf:
            - $ref: '#/components/schemas/UserSummary'
          description: The organizer (Prisma relation name).
        sport_type:
          type: string
          example: football
        event_date:
          type: string
          format: date
          nullable: true
          example: '2026-07-24'
        start_time:
          type: string
          nullable: true
          example: '18:00'
        end_time:
          type: string
          nullable: true
          example: '19:30'
        min_players:
          type: integer
          example: 10
        max_players:
          type: integer
          example: 14
        current_players:
          type: integer
          example: 11
        booking_id:
          type: string
          format: uuid
          nullable: true
          description: '`null` -> the card labels the time "Probable".'
        grounds:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            name:
              type: string
              example: Ground A (7-a-side)
            turfs:
              type: object
              properties:
                id:
                  $ref: '#/components/schemas/Uuid'
                name:
                  type: string
                  example: Gulshan Sports Arena
                address_line_1:
                  type: string
                  nullable: true
                  example: House 42, Road 11
        event_participants:
          type: array
          items:
            type: object
            properties:
              user_id:
                $ref: '#/components/schemas/Uuid'
              status:
                $ref: '#/components/schemas/ParticipantStatus'
              users:
                $ref: '#/components/schemas/UserSummary'
        turfmates_involved:
          type: array
          description: |
            Which of the caller's turfmates organize or play in this match.
            Present **only** on authenticated requests that have turfmates.
          items:
            $ref: '#/components/schemas/UserSummary'
        my_role:
          type: string
          nullable: true
          enum: [organizer, co_organizer, player, null]
          description: >-
            The CALLING user's own relationship to this match, so the feed can
            highlight matches they run or play in. `organizer` (creator),
            `co_organizer` (match admin), `player` (approved/invited/requested
            participant), or `null` (not involved). Present **only** on
            authenticated requests.
          example: player

    NearbyEvent:
      type: object
      description: |
        Flat row from the geo search (raw SQL, haversine on turf coordinates —
        no PostGIS).
      required: [id, title, distance_km]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        title:
          type: string
          example: Friday Night 7s
        sport_type:
          type: string
          example: football
        event_date:
          type: string
          format: date
          example: '2026-07-24'
        start_time:
          type: string
          example: '18:00:00'
        end_time:
          type: string
          example: '19:30:00'
        min_players:
          type: integer
          example: 10
        max_players:
          type: integer
          example: 14
        current_players:
          type: integer
          example: 11
        turf_id:
          $ref: '#/components/schemas/Uuid'
        turf_name:
          type: string
          example: Gulshan Sports Arena
        turf_city:
          type: string
          nullable: true
          example: Gulshan
        ground_name:
          type: string
          example: Ground A (7-a-side)
        distance_km:
          type: number
          format: double
          nullable: true
          description: Rounded to one decimal.
          example: 2.4

    # ---- discussion & chat --------------------------------------------------
    Comment:
      type: object
      description: |
        One comment on a match. Threading is **one level deep** — replying to a
        reply re-parents onto the same root. A soft-deleted comment survives as a
        tombstone (its `content`, `author` and `user_id` all read `null`) so its
        replies keep a parent.
      required: [id, event_id, is_deleted, is_edited, likes_count, liked_by_me]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        event_id:
          $ref: '#/components/schemas/Uuid'
        parent_comment_id:
          type: string
          format: uuid
          nullable: true
          description: '`null` for a top-level comment.'
        content:
          type: string
          nullable: true
          description: '`null` when `is_deleted`.'
          example: I'm in. Bringing two more.
        is_deleted:
          type: boolean
          example: false
        is_edited:
          type: boolean
          example: false
        is_pinned:
          type: boolean
          description: Pinned comments sort first.
          example: false
        likes_count:
          type: integer
          example: 3
        liked_by_me:
          type: boolean
          description: '`false` for anonymous callers.'
          example: false
        created_at:
          type: string
          format: date-time
          example: '2026-07-16T12:00:00.000Z'
        edited_at:
          type: string
          format: date-time
          nullable: true
          example: null
        author:
          type: object
          nullable: true
          description: '`null` when `is_deleted`.'
          allOf:
            - $ref: '#/components/schemas/UserSummary'
        user_id:
          type: string
          format: uuid
          nullable: true
          description: '`null` when `is_deleted`.'

    MessageReaction:
      type: object
      description: Emoji reactions grouped by emoji.
      required: [emoji, count, user_ids]
      properties:
        emoji:
          type: string
          example: 🔥
        count:
          type: integer
          example: 2
        user_ids:
          type: array
          items:
            $ref: '#/components/schemas/Uuid'

    ReplyPreview:
      type: object
      nullable: true
      description: Short preview of the message being replied to.
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        sender_name:
          type: string
          example: Rafi Ahmed
        content:
          type: string
          description: '`"Deleted message"` or `"Photo"` when there is no text.'
          example: Who's bringing the ball?

    Message:
      type: object
      description: |
        A squad-chat message. DMs use the same shape plus `recipient_id`. A
        soft-deleted message keeps its id and position but hides content,
        attachment and reactions.
      required: [id, message_type, is_edited, is_deleted, created_at, sender]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        event_id:
          type: string
          format: uuid
          nullable: true
          description: Set for a match chat message; `null` for a DM.
        recipient_id:
          type: string
          format: uuid
          nullable: true
          description: Set for a DM; absent on match chat messages.
        content:
          type: string
          nullable: true
          description: '`null` when deleted. `""` for an attachment-only message.'
          example: On my way, 10 mins late.
        attachment_url:
          type: string
          format: uri
          nullable: true
          description: HTTPS only, max 1000 chars.
          example: null
        message_type:
          type: string
          enum: [text, image, location, system]
          example: text
        is_edited:
          type: boolean
          example: false
        is_deleted:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
          example: '2026-07-16T17:41:00.000Z'
        edited_at:
          type: string
          format: date-time
          nullable: true
          example: null
        reply_to:
          $ref: '#/components/schemas/ReplyPreview'
        reactions:
          type: array
          items:
            $ref: '#/components/schemas/MessageReaction'
        sender:
          $ref: '#/components/schemas/UserSummary'

    Conversation:
      type: object
      description: |
        One row of the unified conversation list — either a 1:1 DM thread or a
        match chat the caller belongs to, sorted by most recent activity.
      required: [type, id, title, unread]
      properties:
        type:
          type: string
          enum: [dm, match]
          example: dm
        id:
          allOf:
            - $ref: '#/components/schemas/Uuid'
          description: The other user's id for a `dm`; the event id for a `match`.
        title:
          type: string
          description: The other user's name, or the match title.
          example: Rafi Ahmed
        sport_type:
          type: string
          nullable: true
          description: '`match` conversations only.'
          example: null
        avatar:
          type: string
          format: uri
          nullable: true
          description: Always `null` for `match`.
          example: https://res.cloudinary.com/funturf/image/upload/v1718000000/images/rafi.jpg
        unread:
          type: integer
          example: 2
        last_message:
          type: object
          nullable: true
          description: '`null` for a match chat nobody has posted in yet.'
          properties:
            content:
              type: string
              description: '`"Message deleted"` / `"Photo"` when there is no text.'
              example: On my way, 10 mins late.
            created_at:
              type: string
              format: date-time
              example: '2026-07-16T17:41:00.000Z'
            from_me:
              type: boolean
              example: false
        activity:
          type: integer
          format: int64
          description: Epoch ms used for sorting. Falls back to the event's creation time.
          example: 1784223660000

    # ---- notifications ------------------------------------------------------
    Notification:
      type: object
      description: |
        One bell entry, always scoped to the caller.

        A user is never notified of their own action (the client toasts those);
        `priority` drives presentation — `high`/`urgent` earn a toast, `low`/`medium`
        are bell-only.
      required: [id, user_id, type, title, message, is_read, priority, created_at]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        user_id:
          $ref: '#/components/schemas/Uuid'
        type:
          type: string
          enum:
            - booking_confirmed
            - booking_cancelled
            - booking_reminder
            - payment_received
            - payment_pending
            - event_invitation
            - event_reminder
            - event_cancelled
            - event_join_request
            - comment_added
            - comment_reply
            - connection_request
            - connection_accepted
          example: payment_received
        title:
          type: string
          example: Payment confirmed
        message:
          type: string
          example: Your booking for Gulshan Sports Arena is confirmed
        data:
          type: object
          nullable: true
          description: Context ids for deep-linking (e.g. `bookingId`, `eventId`, `userId`).
          additionalProperties: true
          example:
            bookingId: 8c2d1f0a-3b4e-4a5c-9d6e-7f8a9b0c1d2e
        priority:
          type: string
          enum: [low, medium, high, urgent]
          example: high
        action_url:
          type: string
          nullable: true
          description: Relative frontend path to open on tap.
          example: /bookings
        is_read:
          type: boolean
          example: false
        read_at:
          type: string
          format: date-time
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: '2026-07-16T18:30:00.000Z'

    # ---- promotions ---------------------------------------------------------
    Promotion:
      type: object
      description: |
        A coupon owned by a turf. Scope narrows through any combination of
        ground, sports, users and weekdays; redemption is applied at booking time.
      required: [id, turf_id, code, title, discount_type, discount_value, valid_from, valid_until, status]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        turf_id:
          $ref: '#/components/schemas/Uuid'
        ground_id:
          type: string
          format: uuid
          nullable: true
          description: Narrows the coupon to one ground. Must belong to the caller's turf.
        code:
          type: string
          maxLength: 50
          description: Uppercased on write. Unique **per turf**.
          example: EID10
        title:
          type: string
          example: Eid weekend 10% off
        description:
          type: string
          nullable: true
          example: Valid on all evening slots during Eid week.
        discount_type:
          type: string
          enum: [percentage, fixed_amount]
          example: percentage
        discount_value:
          type: number
          format: double
          description: '> 0. Capped at 100 when `percentage`.'
          example: 10
        minimum_booking_amount:
          type: number
          format: double
          nullable: true
          description: Floor the booking must clear for the coupon to apply.
          example: 2000
        maximum_discount_amount:
          type: number
          format: double
          nullable: true
          description: Ceiling on the absolute discount.
          example: 500
        valid_from:
          type: string
          format: date-time
          example: '2026-07-01T00:00:00.000Z'
        valid_until:
          type: string
          format: date-time
          description: Must be after `valid_from`.
          example: '2026-07-31T23:59:59.000Z'
        usage_limit:
          type: integer
          nullable: true
          minimum: 1
          description: Global redemption cap. `null` = unlimited.
          example: 100
        used_count:
          type: integer
          description: Server-maintained redemption counter.
          example: 23
        applicable_users:
          type: array
          nullable: true
          description: |
            Restricts the coupon to these users. A targeted coupon is invisible to
            everyone else — private coupons never leak through `/coupons/available`.
          items:
            $ref: '#/components/schemas/Uuid'
          example: null
        applicable_days:
          type: array
          nullable: true
          description: Weekdays the coupon applies on. 0 = Sunday.
          items:
            type: integer
            minimum: 0
            maximum: 6
          example: [4, 5]
        status:
          type: string
          enum: [active, inactive, expired]
          example: active
        ground_rate:
          type: object
          nullable: true
          description: The scoped ground, when one is set (list/detail reads only).
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            name:
              type: string
              example: Ground A (7-a-side)
        is_expired:
          type: boolean
          description: Derived, never persisted — `valid_until` is in the past.
          example: false
        is_exhausted:
          type: boolean
          description: Derived — `used_count` has reached `usage_limit`.
          example: false
        effective_status:
          type: string
          description: |
            Derived at-a-glance state: `expired` and `exhausted` win over the
            stored `status`.
          enum: [active, inactive, expired, exhausted]
          example: active
        created_at:
          type: string
          format: date-time
          example: '2026-06-20T09:00:00.000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-07-02T14:10:00.000Z'

    AvailableCoupon:
      type: object
      description: |
        Customer-facing coupon view. Every scope (window, ground/turf, cap,
        weekday, user targeting) is filtered server-side, so anything returned is
        genuinely applicable to the caller.
      required: [code, title, discount_type, discount_value, is_targeted]
      properties:
        code:
          type: string
          example: EID10
        title:
          type: string
          example: Eid weekend 10% off
        description:
          type: string
          nullable: true
          example: Valid on all evening slots during Eid week.
        discount_type:
          type: string
          enum: [percentage, fixed_amount]
          example: percentage
        discount_value:
          type: number
          format: double
          example: 10
        minimum_booking_amount:
          type: number
          format: double
          nullable: true
          example: 2000
        maximum_discount_amount:
          type: number
          format: double
          nullable: true
          example: 500
        is_targeted:
          type: boolean
          description: '`true` when the coupon was aimed at specific users — badge it in the UI.'
          example: false

# =============================================================================
# FunTurf edge proxy — LOCAL DEVELOPMENT ONLY
# =============================================================================
# This nginx fronts the three API replicas (app1/app2/app3) defined in
# ../docker-compose.yml. Its job is to make the local cluster behave like a real
# multi-replica deploy: load balancing, sticky sessions, WebSocket upgrades,
# upstream failover.
#
# It is deliberately NOT part of the production topology. Render terminates TLS
# and load-balances across instances of a single service at its own edge, so
# running our own nginx there would just add a hop. See ../render.yaml.
#
# Reload after editing (the file is bind-mounted, no rebuild needed):
#   docker compose exec nginx nginx -t && docker compose exec nginx nginx -s reload
# =============================================================================

# One worker per CPU core — nginx is event-driven, more workers than cores just
# adds context switching.
worker_processes auto;

# Raise the per-worker fd ceiling. Every proxied connection burns two fds (client
# + upstream), and Socket.IO connections are long-lived, so the 1024 default is
# reached far sooner than with plain REST traffic.
worker_rlimit_nofile 8192;

events {
  worker_connections 4096;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Don't advertise the nginx version in Server: headers or error pages. Free
  # recon for anyone fingerprinting known-vulnerable versions.
  server_tokens off;

  # ---------------------------------------------------------------------------
  # Logging
  # ---------------------------------------------------------------------------
  # Extends the stock combined format with the bits that matter when debugging a
  # cluster: which replica served the request ($upstream_addr), how long it took
  # ($upstream_response_time), and total wall time ($request_time). Without
  # $upstream_addr you cannot tell whether sticky sessions are actually sticking.
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time urt=$upstream_response_time';

  # Both to the container's stdout/stderr so `docker compose logs -f nginx` works.
  access_log /dev/stdout main;
  error_log  /dev/stderr warn;

  # ---------------------------------------------------------------------------
  # Connection tuning
  # ---------------------------------------------------------------------------
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # Uploads (venue/ground photos) are multipart bodies streamed through here to
  # multer before going to Cloudinary. nginx's default cap is 1m, which silently
  # 413s any real phone photo — the request never reaches Express, so the app
  # logs show nothing. 15m matches what the upload middleware accepts.
  # NOTE: this is deliberately larger than the express.json() limit in app.js
  # (56kb) — that cap governs JSON bodies, this one governs multipart uploads.
  client_max_body_size 15m;
  client_body_timeout 30s;
  client_header_timeout 30s;

  # ---------------------------------------------------------------------------
  # Compression
  # ---------------------------------------------------------------------------
  # JSON API responses (venue lists, event feeds) compress ~80%. Not applied to
  # images — they're already compressed and served from Cloudinary anyway.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;          # below this the header overhead exceeds the saving
  gzip_proxied any;
  gzip_comp_level 5;             # 5 is the knee of the ratio/CPU curve
  gzip_types application/json application/javascript text/plain text/css text/xml;

  # ---------------------------------------------------------------------------
  # WebSocket upgrade mapping
  # ---------------------------------------------------------------------------
  # Socket.IO (src/socket.js) upgrades from HTTP long-polling to a WebSocket. A
  # proxy MUST forward the `Upgrade` header and answer with `Connection: upgrade`
  # or the handshake fails and the client is stuck on polling forever — the old
  # config omitted this entirely, which is why real-time never worked behind the
  # cluster.
  #
  # Why a map instead of a hardcoded `Connection "upgrade"`: that value is only
  # correct for upgrade requests. For ordinary REST calls we want an EMPTY
  # Connection header, which is what lets `keepalive` on the upstream block reuse
  # pooled connections. Sending "close" there (the more common snippet you'll see
  # online) would tear down the pool on every request.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
  }

  # ---------------------------------------------------------------------------
  # Rate limiting (edge layer)
  # ---------------------------------------------------------------------------
  # Defence in depth. The app already rate-limits per-route via express-rate-limit
  # (middlewares/rateLimit.middleware.js); this stops a flood before it costs a
  # replica any Node event-loop time or a Prisma connection.
  # 10m of shared memory tracks ~160k distinct IPs. Rate is intentionally generous
  # — this is a blunt instrument against floods, not the business rule.
  limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/s;
  # Cap concurrent connections per IP. Socket.IO holds one open per tab, so this
  # has to allow for a user with several tabs open.
  limit_conn_zone $binary_remote_addr zone=api_conn:10m;
  limit_req_status 429;
  limit_conn_status 429;

  # ---------------------------------------------------------------------------
  # Upstream pool
  # ---------------------------------------------------------------------------
  upstream backend_upstream {
    # STICKY SESSIONS — required, not an optimisation.
    #
    # A Socket.IO connection starts as a sequence of separate HTTP polling
    # requests that all have to reach the SAME replica: the handshake response
    # carries a session id that only the replica that issued it knows about. With
    # plain round-robin, request 2 lands on a different replica and the client
    # gets "Session ID unknown" in a reconnect loop.
    #
    # `hash $remote_addr consistent` pins a client to a replica by full client IP.
    # `consistent` = ketama hashing, so adding/removing a replica remaps ~1/N of
    # clients instead of reshuffling everyone.
    #
    # Preferred over `ip_hash`, which only hashes the first three octets of an
    # IPv4 — everyone behind one office NAT /24 would pile onto a single replica.
    #
    # This does NOT replace the Redis adapter (src/socket.js): stickiness makes a
    # client's own connection coherent, while Redis is what lets replica A emit to
    # a socket held by replica B. Both are needed.
    hash $remote_addr consistent;

    # max_fails/fail_timeout: eject a replica from the pool after 3 failed
    # attempts and re-probe it 15s later. Without this, nginx keeps forwarding to
    # a dead replica and a third of requests hang until they time out.
    server app1:8080 max_fails=3 fail_timeout=15s;
    server app2:8080 max_fails=3 fail_timeout=15s;
    server app3:8080 max_fails=3 fail_timeout=15s;

    # Keep 32 idle upstream connections warm. Every avoided TCP handshake is a
    # round trip off the p99. Requires HTTP/1.1 + empty Connection header below.
    keepalive 32;
    keepalive_timeout 60s;
  }

  # Shared forwarded headers live in snippets/proxy_common.conf and are pulled in
  # by each location with `include`. They are NOT set here at http level, because
  # `proxy_set_header` replaces rather than merges: any location that sets one
  # header of its own would silently lose all the http-level ones. See the long
  # explanation at the top of that file before touching this.

  # HTTP/1.1 is mandatory for both keepalive and WebSocket upgrades. nginx
  # defaults to 1.0 when proxying, which supports neither.
  proxy_http_version 1.1;

  # Retry the next replica when one dies mid-request. `non_idempotent` is
  # deliberately NOT included: retrying a failed POST could double-book a slot or
  # charge a payment twice.
  proxy_next_upstream error timeout http_502 http_503 http_504;
  proxy_next_upstream_tries 2;

  server {
    listen 80;
    listen [::]:80;
    server_name _;

    # -------------------------------------------------------------------------
    # Baseline security headers
    # -------------------------------------------------------------------------
    # `always` so they're applied to error responses (4xx/5xx) too, not just 2xx.
    # No HSTS here on purpose: this proxy is plain HTTP on localhost, and an HSTS
    # header would pin your browser to https://localhost for months. In production
    # Render's edge sets HSTS itself.
    add_header X-Content-Type-Options "nosniff" always;   # no MIME sniffing
    add_header X-Frame-Options        "DENY" always;      # no framing => no clickjacking
    add_header Referrer-Policy        "no-referrer" always;

    # -------------------------------------------------------------------------
    # Socket.IO — real-time transport
    # -------------------------------------------------------------------------
    # Its own location because it needs settings that would be wrong for REST:
    # no request rate limiting (the polling fallback is bursty by design and would
    # trip the limiter), and a read timeout long enough to outlive an idle
    # WebSocket.
    location /socket.io/ {
      limit_conn api_conn 20;

      proxy_pass http://backend_upstream;

      # Host / X-Real-IP / X-Forwarded-*. MUST be included here — this location
      # sets its own proxy_set_header below, which disables inheritance entirely.
      include /etc/nginx/snippets/proxy_common.conf;

      # The actual upgrade handshake. $connection_upgrade resolves to "upgrade"
      # here via the map above.
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # MUST exceed Socket.IO's pingInterval + pingTimeout (25s + 20s = 45s on
      # the v4 defaults this app uses). A healthy but idle socket sends nothing
      # between pings; if nginx's read timeout fires first it kills the
      # connection and the client reconnect-loops. 10m leaves generous headroom.
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;

      # Buffering holds a response until nginx has enough of it — which is the
      # opposite of what a push transport wants. Off = events reach the browser
      # the moment the replica emits them.
      proxy_buffering off;
    }

    # -------------------------------------------------------------------------
    # Health checks
    # -------------------------------------------------------------------------
    # Proxied to a replica (src/index.js) so it reports whether the APP is up, not
    # merely whether nginx is. Unlogged and unlimited — the compose healthcheck
    # polls it every 10s and would otherwise bury the access log.
    location = /health {
      proxy_pass http://backend_upstream;
      include /etc/nginx/snippets/proxy_common.conf;
      access_log off;
    }

    # Answered by nginx itself. Distinguishes "the proxy is up but every replica
    # is down" (this returns 200, /health returns 502) from "the proxy is down"
    # (both fail). First thing to curl when the cluster looks dead.
    location = /nginx-health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # -------------------------------------------------------------------------
    # REST API — everything else
    # -------------------------------------------------------------------------
    location / {
      # burst=60 nodelay: absorb a 60-request spike immediately (a dashboard
      # opening fires many parallel calls), then hold the 30r/s average. Without
      # `nodelay` the burst would be queued and drip-fed, turning a fast page load
      # into a slow one.
      limit_req  zone=api_rl burst=60 nodelay;
      limit_conn api_conn 20;

      proxy_pass http://backend_upstream;

      # Host / X-Real-IP / X-Forwarded-*. MUST be included here — this location
      # sets its own proxy_set_header below, which disables inheritance entirely.
      include /etc/nginx/snippets/proxy_common.conf;

      # Empty (via the map) for normal requests => the upstream keepalive pool is
      # actually reused. Still upgrades correctly if a WS request ever arrives on
      # a path outside /socket.io/.
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_connect_timeout 5s;    # replica is one hop away on the docker network
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;   # a REST call taking >60s is a bug, not a wait
    }
  }
}

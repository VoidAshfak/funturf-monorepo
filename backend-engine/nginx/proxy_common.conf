# =============================================================================
# Shared proxy headers — included by every proxying location in nginx.conf
# =============================================================================
# WHY THIS FILE EXISTS (important nginx footgun):
#
# `proxy_set_header` does NOT merge across configuration levels — it REPLACES.
# A location inherits the http/server-level headers only if that location defines
# no `proxy_set_header` of its own. The moment one does (e.g. /socket.io/ adding
# `Upgrade`), EVERY inherited header is dropped for that location — silently. No
# warning, no error, `nginx -t` passes.
#
# The failure that causes is nasty and non-obvious: X-Forwarded-For disappears,
# Express (with `trust proxy = 1`) falls back to the socket address, every request
# looks like it came from nginx's container IP, and express-rate-limit puts the
# entire internet in one bucket — so one busy user 429s everybody.
#
# So the headers live here and each location `include`s them. Add a new forwarded
# header HERE, never in a single location.
#
# Mounted/copied to /etc/nginx/snippets/proxy_common.conf.
# =============================================================================

# Preserve the original Host so Express sees the client's hostname, not the
# upstream's container name.
proxy_set_header Host              $host;

# The immediate client IP, as seen by this proxy.
proxy_set_header X-Real-IP         $remote_addr;

# The forwarded-chain header Express parses to derive `req.ip`. `$proxy_add_x_forwarded_for`
# appends $remote_addr to any existing header value rather than overwriting it.
# Paired with `app.set("trust proxy", 1)` in src/app.js — exactly one hop, so a
# client-supplied X-Forwarded-For cannot spoof its way past the rate limiter.
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

# Scheme/host the client actually used, for correct absolute URL generation.
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
